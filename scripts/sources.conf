# Regional high-res sources layered on top of the GEBCO global base.
#
# GEBCO is the implicit base (priority 0, owns zoom 0–9), fetched by scripts/download.
# Each row below is a regional override: scripts/ingest normalizes it to EPSG:4326
# with a datum offset, scripts/mosaic stacks them on the base (highest priority on
# top), and scripts/build tiles each region's bbox at zoom 10–max_zoom.
#
# Format (pipe-separated, order matters):
#   id | url | datum_offset_m | priority | bbox | max_zoom
#
#   id             short slug, used for filenames
#   url            source raster (GeoTIFF/COG/VRT). Multiple tiles: point at a .vrt
#                  or a glob the ingest adapter mosaics. Mirror bulk dirs to R2.
#   datum_offset_m constant added to bring the source to ~MSL (ponytail: a single
#                  offset, not full VDatum — revisit in Phase 3 if seams show)
#   priority       higher wins in overlap; must be > 0 (base is 0)
#   bbox           "west,south,east,north" — tiling extent for the z10+ band
#   max_zoom       display zoom ceiling for this region
#
# Lines starting with # and blank lines are ignored.

# NOAA CUDEM 1/9 arc-sec (~3.4 m), coastal Georgia. NAVD88 ≈ MSL here, offset 0.
# For CI, mirror this tile to R2 (chs.coast.noaa.gov throttles bulk pulls).
cudem_se | https://chs.coast.noaa.gov/htdata/raster2/elevation/NCEI_ninth_Topobathy_2014_8483/southeast/ncei19_n31x25_w081x50_2019v1.tif | 0 | 1 | -81.5,31.0,-81.25,31.25 | 13
