compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = "src/index.ts"
name = "seascape-tiles"

# Mounted under the unified tiles host by path prefix. `wrangler dev` ignores
# this and serves at localhost:8787 root — the worker tolerates the /seascape
# prefix being present (prod) or absent (dev). Keep in sync with BASE_PATH below.
routes = [
  {pattern = "tiles.openwaters.io/seascape/*", zone_name = "openwaters.io"},
]

# R2 bucket holding the published bundles: planet.pmtiles, <source>.pmtiles,
# contours.pmtiles, manifest.json. `wrangler dev` backs this with a LOCAL sim —
# populate it from pipelines/store/bundle via `npm run seed` (see seed.sh).
[[r2_buckets]]
binding = "TILES"
bucket_name = "tiles"

[vars]
# R2 key prefix selecting which release the Worker serves. Prod overrides this at deploy
# with the promoted release dir (e.g. "seascape/<sha>/"); "" = local seed at root.
RELEASE_PREFIX = ""
# URL mount path; must match the route prefix above. "" would serve at root.
BASE_PATH = "/seascape"

# jSquash WebP codecs are imported as WebAssembly modules.
[[rules]]
fallthrough = true
globs = ["**/*.wasm"]
type = "CompiledWasm"

[observability.logs]
enabled = true
invocation_logs = true

# ── Build previews ──────────────────────────────────────────────────────────
# One long-lived Worker fronting every per-commit build at
# data.openwaters.io/bathymetry/build/<sha>/{z}/{x}/{y}.{webp,pbf} — the build's
# leading path segment selects the bundle build.yml already published to the
# public data bucket, so no per-build deploy is needed (deploy-preview-worker.yml
# only redeploys when the Worker/style change). Bound to `data` (a fixed public
# name, no secret); PREVIEW makes the handler read bathymetry/build/<sha>/ and run
# uncached. The route stays off bathymetry/source|landmask/* (the build's /vsicurl
# reads), so it can't shadow them. main/compatibility_*/rules are inherited.
[env.preview]
name = "seascape-preview"
routes = [
  {pattern = "data.openwaters.io/bathymetry/build/*", zone_name = "openwaters.io"},
]

[[env.preview.r2_buckets]]
binding = "TILES"
bucket_name = "data"

[env.preview.vars]
RELEASE_PREFIX = ""
BASE_PATH = "/bathymetry/build"
PREVIEW = "true"
