# Workflow profile, auto-loaded by snakemake (relative to the Snakefile).
# Bare `snakemake <target>` uses every core; -j/--cores still overrides.
cores: all
# Every job reserves memory for scheduler accounting (rules override where they hold
# more); the global budget comes from the caller's --resources mem_gb=N (unlimited
# when unset, e.g. a laptop dry run).
default-resources:
  mem_gb: 2
# greedy over the default ILP selector: identical job ordering at our scales
# (verified empirically), and the ILP's per-round solve melts down with ~10k ready
# jobs (observed: 42 of 48 cores on the scheduler itself at planet scale).
scheduler: greedy
# Engine triggers match the declared policy: code changes are force-only (-R/-F),
# never auto-invalidation — a shell-string edit must not re-merge the planet.
rerun-triggers: [mtime, params, input, software-env]
