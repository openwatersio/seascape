name: Build

# Full planet build on ONE ephemeral Hetzner box (the seamap build-planet.yml pattern):
#   image → boot box → hydrate the store from R2 → run the whole pipeline through `just`
#   → push each stage back to R2 → always-destroy the box. The runner here only
#   orchestrates; the compute is pay-per-build (~€2/hr, ~€10 for a forced planet rebuild).
#
# The store lives in R2 under bathymetry/ as an IMMUTABLE, CONTENT-ADDRESSED store: every artifact
# carries its content-hash key (pipelines/keys.py) IN its filename (<stem>-<key12>.<ext>), so a
# stage skips artifacts whose name is present and a code/config change writes a NEW name — the old
# one becomes unreferenced garbage the GC (gc.yml) collects. Nothing is ever mutated or deleted in
# place. Each planet build assembles a STORE MANIFEST (the content name of every artifact it left)
# and flips a one-object pointer (store/manifest.json) LAST — one atomic PUT — so the next build's
# hydrate and the GC see the whole old world or the whole new one. Source registration/mirroring +
# the land/water masks are sources.yml — a build never contacts an upstream; it reads every byte
# (sources + masks) from R2 over /vsicurl.
# Final bundles land in build/<sha>/; a release promotes that build (release.yml).
#
# Dispatch-only (a shared store shouldn't be mutated by routine pushes); any branch can trigger
# one. A `bbox` builds a self-contained regional slice (no volume, no store push, no manifest/
# pointer, never released). Deletion is out-of-band: gc.yml, sharing this concurrency group, is the
# only path. The light per-commit checks are ci.yml.

on:
  workflow_dispatch:
    inputs:
      bbox:
        description: 'Bounding box "W,S,E,N" (empty = full planet)'
        required: false
        default: ""
      force:
        description: "Force full rebuild — ignore the content-hash keys (escape hatch; keys already see code/config changes)"
        type: boolean
        default: false
      server_type:
        description: "Hetzner type — ccx33 (8 vCPU/32 GB, the account's dedicated-vCPU cap today); ccx63 once the quota is raised"
        required: false
        default: ccx33

env:
  IMAGE: ghcr.io/${{ github.repository }}
  # The public "data" bucket (data.openwaters.io) holds all build state + per-commit builds
  # under bathymetry/. release.yml promotes a finished build into the serving bucket.
  DATA_BUCKET: data
  PUBLIC_BASE: https://data.openwaters.io/bathymetry
  R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
  SERVER_TYPE: ${{ github.event.inputs.server_type }}
  SERVER_IMAGE: ubuntu-24.04
  SERVER_LOCATION: fsn1
  # ServerAlive keepalives: the hosted runner's NAT drops idle TCP after ~4 min, and quiet
  # pipeline stretches (tippecanoe, long warps) go silent for far longer — without keepalives
  # the first silent stage kills the session ("Broken pipe", exit 255; seen on the first
  # dispatch). 30s×20 also rides out ~10 min of transient network loss before giving up.
  SSH_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -o ServerAliveInterval=30 -o ServerAliveCountMax=20"
  NAME: seascape-build-${{ github.run_id }}
  # Dispatch inputs reach every `run:` as env vars, never as raw ${{…}} interpolated into a
  # shell line — a bbox like `$(cmd)` would otherwise run under command substitution in the
  # build.env heredoc / the `[ -z … ]` test.
  BBOX: ${{ github.event.inputs.bbox }}
  FORCE: ${{ github.event.inputs.force }}

# One store-mutating workflow at a time, globally (not per-ref): the store is shared, so a build
# must never interleave with another build, a sources.yml refresh (whose prepared-source syncs use
# --delete), OR the GC (gc.yml, the only deletion path) — all share this group. No
# cancel-in-progress → a new dispatch queues behind the running one rather than cancelling mid-write.
concurrency:
  group: r2-store
  cancel-in-progress: false

jobs:
  # Ensure the deps-only toolchain image exists (code is mounted at runtime), keyed on the files
  # that define the deps (IMAGE_TAG, exported by ghcr-login; shared with ci.yml, so a push-built
  # image is reused here). Skipped when the tag is already in GHCR. The box pulls this image.
  image:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ghcr-login
      - name: Already in GHCR?
        id: have
        run: |
          if docker manifest inspect "$IMAGE:$IMAGE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"; echo "image current: $IMAGE:$IMAGE_TAG"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-buildx-action@v3
        if: steps.have.outputs.exists != 'true'
      - uses: docker/build-push-action@v6
        if: steps.have.outputs.exists != 'true'
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Boot an ephemeral box, hydrate → build → push, always-destroy. 350 min timeout — the max
  # available: GitHub-HOSTED runners hard-cap jobs at 6 h, so it cannot be raised. Routine
  # incrementals fit easily; a full forced planet rebuild on ccx33 may exceed it — the build
  # resumes on re-dispatch by hydrating the LAST COMPLETED build's manifest (its artifacts skip as
  # fresh) and rebuilding only what changed. A build interrupted before its pointer flips redoes
  # its own new work (that new work isn't in any manifest yet), so resume granularity is "the last
  # completed build" — fine for incrementals; ccx63 (quota pending) makes a forced full rebuild fit
  # one window regardless.
  build:
    needs: image
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions: { contents: read, packages: read }
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      # The toolchain image tag (mirrors ghcr-login; hashed here, after checkout, so the
      # workspace exists). The box pulls this exact tag and runs the pipeline through it.
      - name: Toolchain image tag
        run: echo "IMAGE_TAG=deps-${{ hashFiles('Dockerfile', 'pipelines/pyproject.toml', 'pipelines/uv.lock') }}" >> "$GITHUB_ENV"

      - name: Install hcloud CLI
        run: |
          curl -fsSL https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz \
            | tar xz hcloud
          sudo mv hcloud /usr/local/bin/

      - name: Boot ephemeral server
        run: |
          ssh-keygen -t ed25519 -N "" -f id_build -q
          hcloud ssh-key create --name "$NAME" --public-key-from-file id_build.pub
          hcloud server create --name "$NAME" \
            --type "$SERVER_TYPE" --image "$SERVER_IMAGE" --location "$SERVER_LOCATION" \
            --ssh-key "$NAME"
          IP=$(hcloud server ip "$NAME")
          echo "IP=$IP" >> "$GITHUB_ENV"
          # Planet builds work on an attached volume; the root disk is too small. Sizing:
          # ~50 GiB hydrated tile/vector store + bundle outputs which ~2x during pmtiles
          # finalize (~100 GiB peak) + the dirty-set source hydrate (the full coastal
          # S-102+CUDEM subset is ~100-200 GiB) → 400 GiB with headroom. A bbox build is
          # self-contained on the root disk (like seamap's AREA smoke), so skip the volume.
          if [ -z "$BBOX" ]; then
            hcloud volume create --name "$NAME" --size 400 --server "$NAME"
          fi
          for _ in $(seq 1 60); do
            # shellcheck disable=SC2086  # SSH_OPTS is intentionally word-split into flags
            ssh $SSH_OPTS -i id_build "root@$IP" true 2>/dev/null && exit 0
            sleep 5
          done
          echo "server never became reachable" >&2; exit 1

      - name: Build & publish
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          GHCR_TOKEN: ${{ github.token }}
          GHCR_USER: ${{ github.actor }}
        run: |
          # Secrets + config to source on the box (kept off every command line). rclone reads
          # the RCLONE_CONFIG_R2_* vars for the store sync; the AWS_* vars are the S3-API
          # plumbing the pipeline expects for any /vsis3 read (source COGs are /vsicurl-public,
          # so they aren't used today, but they cost nothing to carry).
          #
          # EVERY value is written via %q, never verbatim: build.env is `source`d as bash on
          # the box, so anything written raw becomes code. The live vector is the dispatch
          # inputs — a crafted bbox ('x"; curl …|bash; echo "') would execute with the R2 creds
          # in the same file, and a "boolean" FORCE input is UI coercion only, not API-level
          # validation — but quoting the secrets/config too makes the file safe by construction.
          {
            printf 'export RCLONE_CONFIG_R2_TYPE=%q\n'              s3
            printf 'export RCLONE_CONFIG_R2_PROVIDER=%q\n'          Cloudflare
            printf 'export RCLONE_CONFIG_R2_ENDPOINT=%q\n'          "$R2_ENDPOINT"
            printf 'export RCLONE_CONFIG_R2_ACCESS_KEY_ID=%q\n'     "$R2_ACCESS_KEY_ID"
            printf 'export RCLONE_CONFIG_R2_SECRET_ACCESS_KEY=%q\n' "$R2_SECRET_ACCESS_KEY"
            printf 'export RCLONE_CONFIG_R2_NO_CHECK_BUCKET=%q\n'   true
            printf 'export AWS_ACCESS_KEY_ID=%q\n'                  "$R2_ACCESS_KEY_ID"
            printf 'export AWS_SECRET_ACCESS_KEY=%q\n'              "$R2_SECRET_ACCESS_KEY"
            printf 'export AWS_DEFAULT_REGION=%q\n'                 auto
            printf 'export AWS_ENDPOINT_URL=%q\n'                   "$R2_ENDPOINT"
            printf 'export GHCR_TOKEN=%q\n'                         "$GHCR_TOKEN"
            printf 'export GHCR_USER=%q\n'                          "$GHCR_USER"
            printf 'export IMAGE=%q\n'                              "$IMAGE"
            printf 'export IMAGE_TAG=%q\n'                          "$IMAGE_TAG"
            printf 'export DATA_BUCKET=%q\n'                        "$DATA_BUCKET"
            printf 'export PUBLIC_BASE=%q\n'                        "$PUBLIC_BASE"
            printf 'export SHA=%q\n'                                "$GITHUB_SHA"
            printf 'export BBOX=%q\n'                               "$BBOX"
            printf 'export FORCE=%q\n'                              "$FORCE"
          } > build.env

          rsync -az --delete --exclude .git --exclude node_modules --exclude data --exclude pipelines/store \
            -e "ssh $SSH_OPTS -i id_build" ./ "root@$IP:/root/seascape/"
          # shellcheck disable=SC2086  # SSH_OPTS is intentionally word-split into flags
          scp $SSH_OPTS -i id_build build.env "root@$IP:/root/seascape/build.env"

          # The remote script is single-quoted (<<'REMOTE'): nothing here is interpolated by
          # Actions or this shell — every value comes from build.env, sourced on the box.
          # shellcheck disable=SC2086  # SSH_OPTS is intentionally word-split into flags
          ssh $SSH_OPTS -i id_build "root@$IP" bash -se <<'REMOTE'
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          cd /root/seascape
          set -a; source build.env; set +a

          # ── toolchain: docker + the PINNED sha256-verified rclone (apt's 1.60.1 501s on R2's
          #    version-id responses — same pin as sources.yml/release.yml) ──
          apt-get update -qq
          apt-get install -y -qq unzip e2fsprogs jq   # jq: read the store pointer + manifest
          command -v docker >/dev/null || curl -fsSL https://get.docker.com | sh
          curl -fsSL -o /tmp/rclone.zip "https://downloads.rclone.org/v1.74.4/rclone-v1.74.4-linux-amd64.zip"
          echo "fe435e0c36228e7c2f116a8701f01127bb1f694005fc11d1f27186c8bca4115d  /tmp/rclone.zip" | sha256sum -c
          unzip -q -j /tmp/rclone.zip '*/rclone' -d /tmp/rclone-bin
          install /tmp/rclone-bin/rclone /usr/local/bin/rclone

          # ── GHCR toolchain image (private; same github.token auth as ci.yml) ──
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker pull "$IMAGE:$IMAGE_TAG"

          # ── store on the attached volume for a planet build, the root disk for a bbox ──
          if [ -z "${BBOX:-}" ]; then
            for i in $(seq 1 12); do
              DEV=$(ls /dev/disk/by-id/scsi-0HC_Volume_* 2>/dev/null | head -1 || true)
              [ -n "${DEV:-}" ] && break || sleep 5
            done
            [ -n "${DEV:-}" ] || { echo "build volume never attached" >&2; exit 1; }
            mkfs.ext4 -qF "$DEV"; mkdir -p /mnt/store; mount "$DEV" /mnt/store
            STORE=/mnt/store
          else
            STORE=/root/seascape/pipelines/store
          fi
          mkdir -p "$STORE"

          # ── knobs, computed HERE, not in Python — the pipeline stays R2/host-agnostic.
          #    AGG_PROCESSES = min(cores, RAM_GB/5). Per-worker memory budget: merged-DEM peak
          #    ~4 GB (the dominant term; a max 32768px tile ≈ 4 GB float32, more with halo +
          #    smooth) + GDAL_CACHEMAX 512 MB + 256 MB curl cache + ~32 MB VSI cache per open
          #    dataset ≈ 5 GB — every cache below is PER PROCESS (workers share nothing), so
          #    they scale with the worker count. ccx33 (8 cores / 32 GB) → 6 workers: ~5 GB of
          #    caches + ~26 GB of DEM headroom, ~1 GB left for OS/docker. ccx63 (48 / 192) → 38.
          #    BUNDLE_PROCESSES = min(cores, RAM_GB/8), more conservative — a bundle worker
          #    reads whole input pmtiles into RAM and the planet base is one multi-GB unit,
          #    unlike aggregate's bounded per-tile DEMs. ──
          CORES=$(nproc)
          MEM_GB=$(( $(getconf _PHYS_PAGES) * $(getconf PAGE_SIZE) / 1073741824 ))
          AGG=$(( MEM_GB / 5 )); [ "$AGG" -gt "$CORES" ] && AGG=$CORES; [ "$AGG" -lt 1 ] && AGG=1
          BND=$(( MEM_GB / 8 )); [ "$BND" -gt "$CORES" ] && BND=$CORES; [ "$BND" -lt 1 ] && BND=1
          export AGG_PROCESSES=$AGG
          export BUNDLE_PROCESSES=$BND
          export GDAL_CACHEMAX=512
          # The toolchain identity for the content-hash keys (pipelines/keys.py): the deps-keyed
          # image tag pins one GDAL/tippecanoe, so bumping the toolchain correctly invalidates
          # every key (dispatch a rebuild deliberately after a GDAL bump).
          export TOOLCHAIN="$IMAGE:$IMAGE_TAG"
          if [ "${FORCE:-}" = "true" ]; then export FORCE_REBUILD=1; else export FORCE_REBUILD=; fi
          echo "box: ${CORES} cores / ${MEM_GB} GB → AGG_PROCESSES=$AGG_PROCESSES, BUNDLE_PROCESSES=$BUNDLE_PROCESSES, BBOX='${BBOX:-}', FORCE='${FORCE:-}'"

          # docker run wrapper: repo code at /app, the store bind-mounted, BBOX/FORCE/TOOLCHAIN
          # forwarded (+ BUNDLE_PROCESSES — only bundle.py reads it; harmless elsewhere).
          dr() { docker run --rm -v /root/seascape:/app -v "$STORE:/app/pipelines/store" \
            -e BBOX -e FORCE_REBUILD -e TOOLCHAIN -e BUNDLE_PROCESSES "$IMAGE:$IMAGE_TAG" just "$@"; }

          R2="R2:$DATA_BUCKET/bathymetry"
          # --retries 5: R2 occasionally returns a transient 500 InternalError; ride it out
          # instead of failing the stage (same convention as sources.yml's mirror). Applied to
          # EVERY transfer, the single-file copyto publishes included — a flake on manifest.json
          # would break the completeness contract.
          XFER="--transfers 32 --checkers 64 --fast-list --retries 5 --stats 30s --stats-one-line"
          hydrate()    { rclone copy "$R2/$1" "$STORE/$2" $XFER "${@:3}"; }
          # Content-addressed store: an unchanged key is skipped and a push is delta-sized. ONE
          # pass, no ordering to get right — the per-tile artifacts self-mark (the key is IN the
          # name) and the pointer flip (not push order) is the atomicity mechanism, so a partial
          # push just strands unreferenced objects the GC collects. copy, NEVER sync --delete: a
          # re-key leaves last build's object as garbage, never clobbers a concurrent write.
          push() { rclone copy "$STORE/$1" "$R2/$2" $XFER "${@:3}"; }
          push_build() { rclone copyto "$STORE/bundle/$1" "$R2/build/$SHA/$1" $XFER; }

          # ── HYDRATE (planet only): MANIFEST-DRIVEN. Read the store pointer, fetch the manifest
          #    it names, and rclone copy EXACTLY the artifacts it references (--files-from) — so
          #    unreferenced garbage in the prefixes (superseded keys awaiting GC) costs no hydrate
          #    bytes. Plus each source's bounds.csv + catalog.json (the tile keys read the item's
          #    recipe hash + flags) + the footprint gpkgs. Source COGs + masks are hydrated
          #    selectively AFTER cover (the dirty-set list doesn't exist yet — see the
          #    sources-manifest block below). Bootstrap: no pointer yet = the FIRST immutable
          #    build — hydrate nothing and clean-rebuild (the phase-4 rename makes every phase-3
          #    artifact stale anyway, so a full re-key rebuild happens regardless; adopting the
          #    old mutable names by renaming is not worth the fragility). Once this build's
          #    manifest lands, the legacy names become GC debris. A bbox build rebuilds its window
          #    from scratch and streams sources — bounds + catalog + footprints only, never a
          #    planet-scoped pointer. ──
          if [ -z "${BBOX:-}" ]; then
            echo "── hydrate ──"
            if rclone cat "$R2/store/manifest.json" > /tmp/pointer.json 2>/dev/null && [ -s /tmp/pointer.json ]; then
              mref=$(jq -r '.manifest' /tmp/pointer.json)
              rclone cat "$R2/store/$mref" > /tmp/manifest.json
              jq -r '.entries[].name' /tmp/manifest.json > /tmp/hydrate-files.txt
              n=$(wc -l < /tmp/hydrate-files.txt)
              [ "$n" -gt 0 ] || { echo "store manifest $mref references 0 artifacts — refusing to hydrate an empty world" >&2; exit 1; }
              echo "hydrating $n referenced store artifacts (manifest $mref)"
              rclone copy "$R2" "$STORE" $XFER --files-from /tmp/hydrate-files.txt
            else
              echo "no store pointer in R2 — first immutable build, clean rebuild (nothing to hydrate)"
            fi
            hydrate source source --include '*/bounds.csv' --include '*/catalog.json'
            hydrate polygon polygon
          else
            hydrate source source --include '*/bounds.csv' --include '*/catalog.json'
            hydrate polygon polygon
          fi

          # ── aggregate env. Planet builds read sources + masks from LOCAL disk (hydrated
          #    below, after cover names the dirty tiles): two real runs streaming per tile
          #    banked ZERO tiles in 2.5-3.9 healthy hours — a coastal macrotile re-reads the
          #    same S-102/CUDEM bytes over /vsicurl for every tile, >2.5 h each. With no
          #    SOURCE_VSI_BASE / LANDMASK / WATERMASK set, config.source_path and the landmask
          #    defaults resolve store/source/<id>/<file> and store/landmask/{land,water}.fgb —
          #    the hydrated local copies (the preview-local read path). A legacy bounds row
          #    whose filename is already an absolute /vsi path passes through source_path
          #    untouched and still streams — acceptable fallback. bbox builds are
          #    self-contained (no volume) and keep streaming everything, as before. ──
          AGG_ENV=(-e AGG_PROCESSES -e GDAL_CACHEMAX)
          if [ -n "${BBOX:-}" ]; then
            # Flagged coarse sources (GEBCO/EMODnet) clamp land + subtract inland water over
            # /vsicurl. WATERMASK only when it exists in R2 (landmask._present assumes any
            # /vsi path is reachable).
            AGG_ENV+=(-e SOURCE_VSI_BASE="/vsicurl/$PUBLIC_BASE/source"
                      -e LANDMASK="/vsicurl/$PUBLIC_BASE/landmask/land.fgb")
            if rclone lsf "$R2/landmask/" --include water.fgb 2>/dev/null | grep -q water.fgb; then
              AGG_ENV+=(-e WATERMASK="/vsicurl/$PUBLIC_BASE/landmask/water.fgb")
            else
              echo "no water.fgb in R2 yet — inland-water subtraction degrades to land-only this build"
            fi
          fi
          # Remote-read streaming tuning for whatever still goes over /vsicurl (bbox builds,
          # legacy absolute-path rows): 5 MB range reads (S-102's HDF5 driver is the chattiest
          # reader — big chunks amortize its many small requests), a real per-process curl
          # cache and small per-open-dataset VSI cache (both budgeted in the RAM math above),
          # HTTP/2 multiplexing (R2 speaks it), and a 512 KB first read at open instead of
          # 16 KB (many opens per tile). Inert for local reads, so set unconditionally.
          AGG_ENV+=(-e CPL_VSIL_CURL_CHUNK_SIZE=5242880
                    -e CPL_VSIL_CURL_CACHE_SIZE=268435456
                    -e GDAL_HTTP_MULTIPLEX=YES -e GDAL_HTTP_VERSION=2
                    -e VSI_CACHE=TRUE -e VSI_CACHE_SIZE=33554432
                    -e GDAL_INGESTED_BYTES_AT_OPEN=524288)
          # A dead multiplexed connection must error-and-retry, never hang: the tuned run's
          # workers slid 510% → 180% → 1% CPU and sat at keepalive-only network — GDAL sets
          # NO HTTP timeout by default, and under GDAL_HTTP_MULTIPLEX one dead HTTP/2
          # connection blocks every read sharing it, forever. These timeouts turn the hang
          # into a curl error; the retries that then ride it out are baked in the Dockerfile
          # (GDAL_HTTP_MAX_RETRY=5, GDAL_HTTP_RETRY_DELAY=1 — set in ONE place, for every
          # gdal invocation; deliberately not duplicated here).
          AGG_ENV+=(-e GDAL_HTTP_TIMEOUT=120 -e GDAL_HTTP_CONNECTTIMEOUT=30)

          # ── BUILD, stage by stage, pushing after each so an orchestrator timeout loses at most
          #    one stage. The stage order matches `just planet`; the box just interleaves pushes. ──
          echo "── cover ──"
          dr cover                        # writes the covering (the tiling plan; keys drive dirtiness)

          # ── coverage ∥ aggregate ── the plan's sanctioned DAG overlap: coverage reads only
          # footprints + the covering and aggregate never reads coverage, but its single-
          # threaded tippecanoe ran ~47 min BEFORE aggregate on the first real build, idling
          # every other core. Backgrounded here, joined after aggregate. set -e cannot see a
          # background job's failure, so the explicit wait below propagates its rc — and it
          # sits BEFORE the manifest push, preserving manifest-last completeness (a build
          # without coverage.pmtiles must not get a manifest). Output is prefixed so the two
          # stages' interleaved logs stay readable; pipefail (set above, inherited by the
          # subshell) makes the subshell's status the failing command's, never sed's.
          echo "── coverage (backgrounded alongside aggregate) ──"
          ( { dr coverage && push_build coverage.pmtiles; } 2>&1 | sed -u 's/^/[coverage] /' ) & COV_PID=$!

          # ── selective source hydrate (planet only; overlaps the backgrounded coverage) ──
          # Pull exactly the source files the stale tiles reference, so aggregate reads them
          # from local disk: sources-manifest derives the (source, filename) union with the
          # same key-based dirty derivation the run itself uses (FORCE_REBUILD included).
          # The MASKS hydrate FIRST, before sources-manifest: local mask content hashes enter
          # every fork key, so the manifest and aggregate must see identical mask state — a
          # mask-less manifest run would compute different keys, call every tile stale, and
          # hydrate the full planet source set. They land at the container's DEFAULT
          # store/landmask paths, so aggregate needs no LANDMASK/WATERMASK env: land.fgb is
          # required (flagged coarse sources exist planet-wide — fail here, not per-tile),
          # water.fgb optional (absent → the clamp degrades to land-only, the old behavior).
          # Legacy rows whose filename is an absolute /vsi path aren't R2 keys — filter them
          # out of the files-from list; source_path streams them untouched (the AGG_ENV note).
          if [ -z "${BBOX:-}" ]; then
            echo "── hydrate dirty-set sources ──"
            hydrate landmask landmask --include 'land.fgb' --include 'water.fgb'
            [ -f "$STORE/landmask/land.fgb" ] || { echo "no land.fgb in R2 — flagged coarse sources need the land mask" >&2; exit 1; }
            dr sources-manifest
            grep -v -e '://' -e '/vsi' "$STORE/source-manifest.txt" > /tmp/source-files.txt || true
            legacy=$(grep -c -e '://' -e '/vsi' "$STORE/source-manifest.txt" || true)
            if [ "${legacy:-0}" -gt 0 ]; then
              echo "$legacy legacy absolute-path row(s) keep streaming via /vsicurl"
            fi
            echo "hydrating $(wc -l < /tmp/source-files.txt) of $(wc -l < "$STORE/source-manifest.txt") referenced source file(s)"
            rclone copy "$R2/source" "$STORE/source" --files-from /tmp/source-files.txt $XFER
          fi

          echo "── aggregate ──"
          # Periodic background pushes while aggregate runs. A forced planet rebuild can outlive
          # the orchestrator window (GitHub-HOSTED runners hard-cap jobs at 6 h, so the timeout
          # cannot be raised past ~360), and a stage that pushes only at its end makes zero net
          # progress across re-dispatches: destroy kills the volume, and every retry restarts
          # aggregate from tile 1. rclone copy is idempotent (finished tiles skip), so a 20-min
          # loop makes each re-dispatch monotonic. A file caught mid-write copies torn, but the
          # next pass overwrites it and the final post-stage push (under set -e) is authoritative
          # — acceptable residual. Loop failures never abort the build.
          push_agg() { push pmtiles pmtiles; push contour contour; push soundings soundings; push depare depare; }
          PUSH_LOOP=
          if [ -z "${BBOX:-}" ]; then
            ( while sleep 1200; do push_agg || true; done ) & PUSH_LOOP=$!
          fi
          agg_rc=0
          docker run --rm -v /root/seascape:/app -v "$STORE:/app/pipelines/store" \
            -e BBOX -e FORCE_REBUILD -e TOOLCHAIN "${AGG_ENV[@]}" "$IMAGE:$IMAGE_TAG" just aggregate || agg_rc=$?
          # Kill the loop on BOTH exits (success or failure) before anything else runs.
          if [ -n "$PUSH_LOOP" ]; then kill "$PUSH_LOOP" 2>/dev/null || true; wait "$PUSH_LOOP" 2>/dev/null || true; fi
          # First failure wins, as in the sequential version: on an aggregate failure, reap
          # the in-flight coverage job and fail with aggregate's rc (destroy still runs).
          if [ "$agg_rc" -ne 0 ]; then kill "$COV_PID" 2>/dev/null || true; exit "$agg_rc"; fi
          if [ -z "${BBOX:-}" ]; then
            push_agg
          fi

          # Join the backgrounded coverage: propagate a nonzero rc so a coverage failure fails
          # the build exactly as the sequential version did — well before manifest.json.
          cov_rc=0
          wait "$COV_PID" || cov_rc=$?
          [ "$cov_rc" -eq 0 ] || { echo "coverage stage failed (rc=$cov_rc)" >&2; exit "$cov_rc"; }

          echo "── downsample ──"
          dr downsample
          if [ -z "${BBOX:-}" ]; then
            # Overviews. No covering publish: the retired covering diff was the only consumer of a
            # previous covering — the content names carry all incremental state, and a re-dispatch
            # hydrates the last manifest's artifacts and rebuilds only what never landed.
            push pmtiles pmtiles

            # ── STORE PUBLISH: the content-addressed store is complete after downsample. Assemble
            #    the manifest (a walk of the local store, in aggregate's key-affecting env so its
            #    recomputed keys match the content names), push it, then flip the one-object pointer
            #    LAST — one atomic PUT. A reader (the next hydrate, the GC) sees the whole old world
            #    or the whole new one; a crash before the flip leaves the old pointer over a
            #    complete old store, and this build's pushed-but-unreferenced objects are GC debris.
            #    The bounds.csv-last / catalog-last pattern from sources.yml, generalized. ──
            echo "── store manifest + pointer ──"
            MANIFEST_ID=$(docker run --rm -v /root/seascape:/app -v "$STORE:/app/pipelines/store" \
              -e BBOX -e FORCE_REBUILD -e TOOLCHAIN "${AGG_ENV[@]}" "$IMAGE:$IMAGE_TAG" just store-manifest | tail -1)
            [ -n "$MANIFEST_ID" ] || { echo "store-manifest produced no id" >&2; exit 1; }
            rclone copy "$STORE/manifests" "$R2/store/manifests" $XFER
            n=$(jq -r '.entries | length' "$STORE/manifests/$MANIFEST_ID.json")
            [ "$n" -gt 0 ] || { echo "store manifest $MANIFEST_ID references 0 artifacts — refusing to flip the pointer" >&2; exit 1; }
            printf '{"manifest":"manifests/%s.json","sha":"%s","entries":%s}\n' "$MANIFEST_ID" "$SHA" "$n" \
              | rclone rcat "$R2/store/manifest.json"
            echo "store published: manifest $MANIFEST_ID ($n artifacts), pointer flipped"
          fi

          echo "── bundle (terrain) ──"
          dr bundle
          rclone copy "$STORE/bundle" "$R2/build/$SHA" $XFER --include 'planet.pmtiles' --include 'overlay-*.pmtiles'

          echo "── vector layers ──"
          # Completeness is SELF-ENFORCED here, not step order: each bundler verifies every
          # covering tile left an artifact or .empty marker (contour_run.verify_vector_complete)
          # before bundling — the same invariant the store manifest hard-failed on above, so
          # reordering these steps past the manifest can't silently bundle a holed layer.
          dr soundings                    # soundings + depare bundle BEFORE contours: the single
          dr depare                       # tile-join folds them into vector.pmtiles
          dr contours
          push_build vector.pmtiles

          # ── No prune here. Deletion is OUT-OF-BAND: gc.yml (weekly + dispatch, sharing the
          #    r2-store concurrency group so it never runs during a build) is the ONLY deletion
          #    path. A re-tile / re-key writes new content names + a new manifest and the pointer
          #    flips to it; the superseded objects become unreferenced garbage the GC collects.
          #    The phase-3 covering-orphan prunes (list, 25% guard, pmtiles-before-FGB ordering)
          #    and the legacy-covering purge are gone — content addressing makes a re-tile
          #    additive, never a delete. ──

          # ── manifest.json LAST — its presence marks a complete build (release.yml refuses a sha
          #    without one). Everything it references (planet + overlays + vector + coverage) is
          #    already up. ──
          push_build manifest.json
          echo "── build complete → $R2/build/$SHA ──"
          REMOTE

      - name: Destroy server
        if: always()
        run: |
          # Best-effort delete all three, then FAIL if a billable resource (server, volume)
          # still exists — a leaked box must show as a red step, not invisible cost. Resources
          # that never existed (boot failed early, bbox build without a volume) pass clean.
          hcloud server delete "$NAME" 2>/dev/null || true
          # The volume (planet builds only) detaches when the server is deleted; then remove it.
          if hcloud volume describe "$NAME" >/dev/null 2>&1; then
            for _ in $(seq 1 12); do
              if hcloud volume delete "$NAME" 2>/dev/null; then break; else sleep 5; fi
            done
          fi
          hcloud ssh-key delete "$NAME" 2>/dev/null || true   # not billable; best-effort
          fail=0
          if hcloud server describe "$NAME" >/dev/null 2>&1; then
            echo "::error::leaked Hetzner server $NAME — delete it manually (billing until then)"
            fail=1
          fi
          if hcloud volume describe "$NAME" >/dev/null 2>&1; then
            echo "::error::leaked Hetzner volume $NAME — delete it manually (billing until then)"
            fail=1
          fi
          exit "$fail"

  # A complete planet build from main auto-promotes itself: dispatch release.yml for this sha.
  # Only main builds deploy; a feature-branch build writes build/<sha>/ but won't ship. A bbox
  # build is a window slice and never claims planet validity, so it never releases.
  release:
    needs: build
    if: ${{ github.ref == 'refs/heads/main' && github.event.inputs.bbox == '' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions: { actions: write }
    steps:
      - name: Dispatch release for this build
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh workflow run release.yml -f sha=${{ github.sha }}
