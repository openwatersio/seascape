name: Build

# The Snakemake build lane, REPLACING the legacy stage choreography at this path: the same
# infrastructure as sources.yml (image, Hetzner runner, persistent store volume, teardown,
# leak checks) but the per-stage docker runs collapse to TWO chained Snakemake invocations —
# the catalogs invocation (covering from the volume's canonical sources), then the build
# invocation (pipelines/build.smk), which parses purely from disk and structurally contains
# no fetch rule. On this branch `gh workflow run build.yml --ref <branch>` runs THIS file
# while main's legacy copy keeps planet production — merging the branch is cutover B
# (docs/plans/2026-07-14-snakemake-build.md, phases 8-11).
#
# Scope today: stage 2 (the mosaic) only — the first dispatch is the MEASUREMENT run the
# memory plan calls for. Every mosaic_tile job runs isolated with a benchmark: directive, so
# per-tile max-RSS data lands in store/bench/ and survives even if the run dies. Tiles are
# plain-named on the volume; NOTHING publishes to R2 from this workflow yet (publish rules
# arrive with stage 3), so serving state is structurally untouchable from here.
#
# Named follow-ups, deliberately not in this revision:
#   - per-job kernel memory caps (cgroup / docker run --memory per job): added once the
#     measurement run's benchmarks give real reservations to enforce; until then the global
#     --resources budget + per-job process isolation + retries bound the blast radius.
#   - planet-mosaic sizing vs the volume (plan phase 8): check before the first FULL planet
#     dispatch; a bbox smoke first is the intended path.
#   - a warm volume is assumed: if a source's registration is missing, the cover invocation
#     can reach stage-1 prep rules (it is the catalogs invocation) — run sources.yml first.

on:
  workflow_dispatch:
    inputs:
      bbox:
        description: 'Bounding box "W,S,E,N" (empty = full planet)'
        required: false
        default: ""
      force:
        description: "Force: -F on the build invocation (code changes are force-only by design)"
        type: boolean
        default: false
      server_type:
        description: "Hetzner type — ccx63 (48 vCPU/192 GB) for planet; ccx33 (8/32) for a bbox smoke"
        required: false
        default: ccx63

env:
  IMAGE: ghcr.io/${{ github.repository }}
  SERVER_TYPE: ${{ github.event.inputs.server_type }}
  SERVER_IMAGE: ubuntu-24.04
  SERVER_LOCATION: fsn1
  # The persistent store volume — see main's legacy build.yml for its full story; this lane
  # reads the same canonical stage-1 store and adds store/mosaic/ + store/bench/.
  STORE_VOLUME: seascape-store
  STORE_VOLUME_GB: "750"
  NAME: seascape-build-${{ github.run_id }}

# One store-mutating workflow at a time, globally: builds, sources runs, and GC share this
# group. NOTE: a second queued dispatch EVICTS the first (observed) — one dispatch at a time.
concurrency:
  group: r2-store
  cancel-in-progress: false

jobs:
  # Ensure the deps-only toolchain image exists (shared with ci.yml/sources.yml).
  image:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ghcr-login
      - name: Already in GHCR?
        id: have
        run: |
          if docker manifest inspect "$IMAGE:$IMAGE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"; echo "image current: $IMAGE:$IMAGE_TAG"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-buildx-action@v3
        if: steps.have.outputs.exists != 'true'
      - uses: docker/build-push-action@v6
        if: steps.have.outputs.exists != 'true'
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Boot the Hetzner box, register it as a self-hosted runner, attach the store volume.
  create-runner:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    outputs:
      label: ${{ steps.runner.outputs.label }}
      server_id: ${{ steps.runner.outputs.server_id }}
    steps:
      - name: Create runner
        id: runner
        uses: Cyclenerd/hcloud-github-runner@v1.4.1
        with:
          mode: create
          github_token: ${{ secrets.RUNNER_PAT }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ env.NAME }}
          server_type: ${{ env.SERVER_TYPE }}
          location: ${{ env.SERVER_LOCATION }}
          image: ${{ env.SERVER_IMAGE }}
          volume: "null"
      # The store volume holds the canonical stage-1 sources this lane builds FROM — attached
      # for bbox smokes too (unlike the legacy NVMe-scratch bbox path): the mosaic lane always
      # reads the volume's catalogs and writes plain-named tiles beside them.
      - name: Attach persistent store volume
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SERVER_ID: ${{ steps.runner.outputs.server_id }}
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/hcloud.tgz https://github.com/hetznercloud/cli/releases/download/v1.66.0/hcloud-linux-amd64.tar.gz
          echo "8b1a8598858232c491f58cbf65ce1bd0ec6f725114bb62ec967a20ab03e29a86  /tmp/hcloud.tgz" | sha256sum -c
          tar xzf /tmp/hcloud.tgz -C /tmp hcloud
          sudo mv /tmp/hcloud /usr/local/bin/
          hcloud volume attach "$STORE_VOLUME" --server "$SERVER_ID"
          echo "volume $STORE_VOLUME attached to server $SERVER_ID"

  # The build: covering (catalogs invocation) then the mosaic (build invocation), natively on
  # the box. timeout-minutes REQUIRED even self-hosted (default per-job timeout is 360 min).
  build:
    needs: [image, create-runner]
    runs-on: ${{ needs.create-runner.outputs.label }}
    timeout-minutes: 2880
    permissions: { contents: read, packages: read }
    steps:
      - uses: actions/checkout@v6
      # Idempotent box setup — docker + the store volume mount. STATE is the volume root
      # (contains store/ and .snakemake/), mounted whole so both persist. A build assumes a
      # warm volume — refuse to run against a blank one (that's sources.yml's job).
      - name: Set up box (docker + store volume)
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          command -v docker >/dev/null || curl -fsSL https://get.docker.com | sh
          if ! mountpoint -q /mnt/seascape-store; then
            dev=""
            for _ in $(seq 1 30); do
              for d in /dev/disk/by-id/scsi-0HC_Volume_*; do [ -e "$d" ] && dev="$d" && break; done
              [ -n "$dev" ] && break
              sleep 2
            done
            [ -n "$dev" ] || { echo "store volume device never appeared — attach step skipped or volume held elsewhere?" >&2; exit 1; }
            mkdir -p /mnt/seascape-store
            mount -o noatime "$dev" /mnt/seascape-store
          fi
          STATE=/mnt/seascape-store
          [ -d "$STATE/store/source" ] || { echo "volume has no store/source — run sources.yml first (a build assumes a warm volume)" >&2; exit 1; }
          echo "STATE=$STATE" >> "$GITHUB_ENV"
      - uses: ./.github/actions/ghcr-login
      # A SIGKILLed previous run leaves .snakemake locks on the volume; safe to clear here —
      # the r2-store concurrency group guarantees no other lane run holds the store. One
      # unlock covers both invocations (same workdir, same lock directory).
      - name: Unlock a stale workflow lock (crash recovery)
        run: |
          ./docker.sh snakemake --unlock --config workdir=/app/state
      - name: Build the mosaic (Snakemake)
        env:
          # Dispatch inputs reach the shell as env vars, never interpolated into a shell line.
          BBOX: ${{ github.event.inputs.bbox }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
          # Mirrored sources (CUDEM/S-102) stream from the public mirror; prepped sources
          # read the volume (source_path: a local file wins per file). Curl caches sized as
          # in the legacy build; both fit inside the global reserve below.
          SOURCE_VSI_BASE: /vsicurl/https://data.openwaters.io/bathymetry/source
          CPL_VSIL_CURL_CHUNK_SIZE: "5242880"
          CPL_VSIL_CURL_CACHE_SIZE: "268435456"
          VSI_CACHE: "TRUE"
          VSI_CACHE_SIZE: "33554432"
        run: |
          set -euo pipefail
          # Global budget: RAM minus a stated reserve (OS + Snakemake + curl/VSI caches +
          # page-cache headroom). Scheduling only — the per-job kernel cap is the named
          # follow-up in the header, informed by this run's benchmarks.
          RESERVE_GB=22
          total_gb=$(awk '/MemTotal/ {print int($2/1024/1024)}' /proc/meminfo)
          budget_gb=$((total_gb - RESERVE_GB))
          cores=$(nproc)
          echo "box: ${total_gb} GB RAM, ${cores} cores -> budget ${budget_gb} GB (reserve ${RESERVE_GB} GB)"
          force=()
          if [ "$INPUT_FORCE" = "true" ]; then force=(-F); fi
          # Invocation 1 — the covering, from the volume's canonical stage-1 products.
          ./docker.sh snakemake cover --rerun-incomplete \
            --cores "$cores" --resources mem_gb="$budget_gb" --config workdir=/app/state
          # Invocation 2 — the mosaic: parses purely from the covering; contains no fetch
          # rule by construction. keep-going: one failed tile leaves the rest building (and
          # its benchmark row behind); the run goes red as the alert.
          ./docker.sh snakemake -s pipelines/build.smk mosaic \
            --keep-going --rerun-incomplete \
            --cores "$cores" --resources mem_gb="$budget_gb" \
            --config workdir=/app/state "${force[@]}"
      # Per-job wall/CPU/max-RSS — the measurement this lane exists to produce.
      - name: Upload snakemake benchmarks
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snakemake-bench-${{ github.run_id }}
          path: ${{ env.STATE }}/store/bench/
          if-no-files-found: ignore
          retention-days: 90

  # Provider-side CPU/disk/network series while the server still exists (same as sources.yml).
  collect-metrics:
    needs: [create-runner, build]
    if: ${{ always() && needs.create-runner.outputs.server_id != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Fetch Hetzner host metrics
        continue-on-error: true
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SERVER_ID: ${{ needs.create-runner.outputs.server_id }}
        run: scripts/collect-hcloud-metrics "$SERVER_ID"
      - name: Upload Hetzner host metrics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hcloud-metrics-${{ github.run_id }}-${{ needs.create-runner.outputs.server_id }}
          path: hcloud-metrics/
          if-no-files-found: ignore
          retention-days: 90

  # Destroy the box + deregister the runner, ALWAYS. The store volume is never deleted.
  delete-runner:
    needs: [create-runner, build, collect-metrics]
    if: always()
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - name: Delete runner + server
        if: ${{ needs.create-runner.outputs.server_id != '' }}
        uses: Cyclenerd/hcloud-github-runner@v1.4.1
        with:
          mode: delete
          github_token: ${{ secrets.RUNNER_PAT }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ env.NAME }}
          server_id: ${{ needs.create-runner.outputs.server_id }}
      - name: Verify no leaked resources
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/hcloud.tgz https://github.com/hetznercloud/cli/releases/download/v1.66.0/hcloud-linux-amd64.tar.gz
          echo "8b1a8598858232c491f58cbf65ce1bd0ec6f725114bb62ec967a20ab03e29a86  /tmp/hcloud.tgz" | sha256sum -c
          tar xzf /tmp/hcloud.tgz -C /tmp hcloud
          sudo mv /tmp/hcloud /usr/local/bin/
          fail=0
          if hcloud server describe "$NAME" >/dev/null 2>&1; then
            echo "::error::leaked billable resource: Hetzner server $NAME still exists — delete it manually"
            fail=1
          fi
          if hcloud volume describe "$NAME" >/dev/null 2>&1; then
            echo "::error::leaked billable resource: Hetzner volume $NAME still exists — delete it manually"
            fail=1
          fi
          exit "$fail"
