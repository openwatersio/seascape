name: Build

# Full planet build on ONE on-demand Hetzner box, run as a SELF-HOSTED GitHub Actions runner
# (Cyclenerd/hcloud-github-runner): image → create-runner boots the box + registers it as a runner
# → the `build` job runs NATIVELY on that box (no SSH, no rsync, no heredoc) → push each stage back
# to R2 → delete-runner always-destroys the box and deregisters the runner. The
# ubuntu-latest jobs only create/destroy infra; the compute is a pay-per-build box (~€2/hr, ~€10 for
# a forced planet rebuild).
#
# Why self-hosted instead of the old SSH-into-an-ephemeral-box model: GitHub-HOSTED runners hard-cap
# a job at 6 h, which the old `build` job orchestrated around (timeout-minutes: 350, resume-on-
# re-dispatch). The build itself runs on the Hetzner box either way — but making that box a runner
# lifts the 6 h job cap (self-hosted jobs have none); the only remaining ceiling is the 72 h
# workflow-run limit that applies to everyone — far above any build — so a forced full planet
# rebuild now runs to completion in one window regardless of size.
# It also deletes the entire SSH surface — keygen/boot-wait/rsync/scp/`ssh … <<'REMOTE'`, the NAT
# keepalive tuning, and the `build.env` + `%q` quoting: secrets now flow as native job `env:`,
# which removes the sourced-file code-injection vector by construction (no file is ever `source`d).
#
# The store lives in R2 under bathymetry/ as an IMMUTABLE, CONTENT-ADDRESSED store: every artifact
# carries its content-hash key (pipelines/keys.py) IN its filename (<stem>-<key12>.<ext>), so a
# stage skips artifacts whose name is present and a code/config change writes a NEW name — the old
# one becomes unreferenced garbage the GC (gc.yml) collects. Nothing is ever mutated or deleted in
# place. Each planet build assembles a STORE MANIFEST (the content name of every artifact it left)
# and flips a one-object pointer (store/manifest.json) LAST — one atomic PUT — so the next build's
# hydrate and the GC see the whole old world or the whole new one. Source registration/mirroring +
# the land/water masks are sources.yml — a build never contacts an upstream; it reads every byte
# (sources + masks) from R2 over /vsicurl.
# Final bundles land in build/<sha>/; a release promotes that build (release.yml).
#
# Dispatch-only (a shared store shouldn't be mutated by routine pushes); any branch can trigger
# one. A `bbox` builds a self-contained regional slice (no volume, no store push, no manifest/
# pointer, never released). Deletion is out-of-band: gc.yml, sharing this concurrency group, is the
# only path. The light per-commit checks are ci.yml.

on:
  workflow_dispatch:
    inputs:
      bbox:
        description: 'Bounding box "W,S,E,N" (empty = full planet)'
        required: false
        default: ""
      force:
        description: "Force full rebuild — ignore the content-hash keys (escape hatch; keys already see code/config changes)"
        type: boolean
        default: false
      server_type:
        description: "Hetzner type — ccx63 (48 vCPU/192 GB, dedicated-vCPU quota approved); ccx33 (8/32) for a cheaper smoke. Worker knobs (AGG/TERRAIN/BUNDLE_PROCESSES, GDAL_CACHEMAX) auto-size from the box's RAM."
        required: false
        default: ccx63

env:
  IMAGE: ghcr.io/${{ github.repository }}
  # The public "data" bucket (data.openwaters.io) holds all build state + per-commit builds
  # under bathymetry/. release.yml promotes a finished build into the serving bucket.
  DATA_BUCKET: data
  PUBLIC_BASE: https://data.openwaters.io/bathymetry
  R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
  SERVER_TYPE: ${{ github.event.inputs.server_type }}
  SERVER_IMAGE: ubuntu-24.04
  SERVER_LOCATION: fsn1
  # Server hostname AND runner label (Cyclenerd/hcloud-github-runner registers the runner with
  # --labels "<name>,hetzner").
  NAME: seascape-build-${{ github.run_id }}
  # Dispatch inputs reach every `run:` as env vars, never as raw ${{…}} interpolated into a
  # shell line — a bbox like `$(cmd)` would otherwise run under command substitution.
  BBOX: ${{ github.event.inputs.bbox }}
  FORCE: ${{ github.event.inputs.force }}

# One store-mutating workflow at a time, globally (not per-ref): the store is shared, so a build
# must never interleave with another build, a sources.yml refresh (whose prepared-source syncs use
# --delete), OR the GC (gc.yml, the only deletion path) — all share this group. No
# cancel-in-progress → a new dispatch queues behind the running one rather than cancelling mid-write.
concurrency:
  group: r2-store
  cancel-in-progress: false

jobs:
  # Ensure the deps-only toolchain image exists (code is mounted at runtime), keyed on the files
  # that define the deps (IMAGE_TAG, exported by ghcr-login; shared with ci.yml, so a push-built
  # image is reused here). Skipped when the tag is already in GHCR. The box pulls this image.
  image:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ghcr-login
      - name: Already in GHCR?
        id: have
        run: |
          if docker manifest inspect "$IMAGE:$IMAGE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"; echo "image current: $IMAGE:$IMAGE_TAG"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-buildx-action@v3
        if: steps.have.outputs.exists != 'true'
      - uses: docker/build-push-action@v6
        if: steps.have.outputs.exists != 'true'
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Boot an on-demand Hetzner box and register it as a self-hosted runner for this repo. The store
  # lives on the box's local NVMe root disk — no attached volume — so this job just boots + registers.
  # server_id is emitted by the action BEFORE its registration wait, so it is available to
  # delete-runner even if registration times out — teardown still runs.
  create-runner:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    outputs:
      label: ${{ steps.runner.outputs.label }}
      server_id: ${{ steps.runner.outputs.server_id }}
    steps:
      - name: Create runner
        id: runner
        uses: Cyclenerd/hcloud-github-runner@v1.4.1
        with:
          mode: create
          # Fine-grained PAT with repo Administration read/write — the action mints a runner
          # registration token and registers/deregisters the runner. The job's GITHUB_TOKEN can't
          # do this, hence a dedicated RUNNER_PAT secret.
          github_token: ${{ secrets.RUNNER_PAT }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ env.NAME }}
          server_type: ${{ env.SERVER_TYPE }}
          location: ${{ env.SERVER_LOCATION }}
          image: ${{ env.SERVER_IMAGE }}
          # No attached volume: the store lives on the box's LOCAL NVMe root disk. ccx63 ships ~960 GB
          # local NVMe — bigger AND faster than the old 400 GB network volume — so the build (~50 GiB
          # store + ~240 GiB dirty-set sources + ~100 GiB bundle peak ≈ 400 GiB) fits with headroom on
          # root. 'null' is the action's sentinel for "attach none" (an empty string fails its int check).
          # The build job's df precheck fails loudly if a box ever has too small a root disk.
          volume: 'null'

  # Runs NATIVELY on the Hetzner box (runs-on: the runner label the action minted). No SSH, no
  # rsync, no build.env — secrets are native job env, and the pipeline is the same `just` stages
  # the old SSH heredoc ran, in the same order, with the same pushes interleaved. No timeout-
  # minutes: a self-hosted job isn't subject to the 6 h hosted cap; the ceiling is the 72 h
  # workflow limit, effectively non-binding, so a forced full planet rebuild runs to completion.
  build:
    needs: [image, create-runner]
    runs-on: ${{ needs.create-runner.outputs.label }}
    permissions: { contents: read, packages: read }
    env:
      # Native job env — no build.env, no `%q`, nothing is ever `source`d, so the sourced-file
      # code-injection vector the old model quoted around is gone by construction. rclone reads the
      # RCLONE_CONFIG_R2_* vars for the store sync; the AWS_* vars are the S3-API plumbing the
      # pipeline expects for any /vsis3 read (source COGs are /vsicurl-public, so unused today, but
      # they cost nothing to carry).
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6

      # The toolchain image tag (mirrors ghcr-login; hashed here, after checkout, so the
      # workspace exists). The box pulls this exact tag and runs the pipeline through it.
      - name: Toolchain image tag
        run: echo "IMAGE_TAG=deps-${{ hashFiles('Dockerfile', 'pipelines/pyproject.toml', 'pipelines/uv.lock') }}" >> "$GITHUB_ENV"

      - name: Set up toolchain (Docker + pinned rclone, GHCR pull)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          # ── docker + the PINNED sha256-verified rclone (apt's 1.60.1 501s on R2's version-id
          #    responses — same pin as sources.yml/release.yml). jq: read the store pointer +
          #    manifest. The runner runs as root, so no sudo. ──
          apt-get update -qq
          apt-get install -y -qq unzip jq
          command -v docker >/dev/null || curl -fsSL https://get.docker.com | sh
          curl -fsSL -o /tmp/rclone.zip "https://downloads.rclone.org/v1.74.4/rclone-v1.74.4-linux-amd64.zip"
          echo "fe435e0c36228e7c2f116a8701f01127bb1f694005fc11d1f27186c8bca4115d  /tmp/rclone.zip" | sha256sum -c
          unzip -q -j /tmp/rclone.zip '*/rclone' -d /tmp/rclone-bin
          install /tmp/rclone-bin/rclone /usr/local/bin/rclone
          # ── GHCR toolchain image (private; same github.token auth as ci.yml) ──
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker pull "$IMAGE:$IMAGE_TAG"

      - name: Build & publish
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          # ── store on the box's LOCAL NVMe root disk (no attached volume) ── ccx63 has ~960 GB
          #    local NVMe, faster than a network volume. A planet build needs ~400 GiB (store +
          #    dirty-set sources + bundle peak); precheck the root filesystem has room and FAIL LOUD
          #    if a box is ever too small, rather than running out mid-build. bbox is far smaller.
          STORE="$GITHUB_WORKSPACE/pipelines/store"
          mkdir -p "$STORE"
          if [ -z "${BBOX:-}" ]; then
            avail_gb=$(df -BG --output=avail "$STORE" | tail -1 | tr -dc '0-9')
            [ "${avail_gb:-0}" -ge 450 ] || { echo "root disk has only ${avail_gb:-?} GiB free at $STORE — a planet build needs ~450; use a box with a bigger local NVMe (ccx63 = ~960)" >&2; exit 1; }
            echo "store on local NVMe: ${avail_gb} GiB free at $STORE"
          fi

          # ── swap SAFETY NET (planet builds only; the LOCAL NVMe root disk, never the attached
          #    volume or the store path). This is INSURANCE, not headroom: the memory-budget
          #    scheduler (below) keeps the hot working set (~150 GB) in RAM, and the budget stays
          #    sized to PHYSICAL RAM minus reserve, IGNORING this swap. Swap only catches a single
          #    tile that peaks ABOVE its weight estimate — turning a rare exit-137 into a brief
          #    slowdown instead of a dead build. It is NOT room to run more concurrency: swapping the
          #    hot multi-GB merge arrays would thrash. vm.swappiness=10 keeps the working set in RAM
          #    and only spills under real pressure. Torn down with the ephemeral box. ──
          if [ -z "${BBOX:-}" ] && [ ! -e /swapfile ]; then
            fallocate -l 64G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=65536
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
            sysctl -w vm.swappiness=10
          fi

          # ── knobs, computed HERE, not in Python — the pipeline stays R2/host-agnostic.
          #    POOL SIZE vs MEMORY BUDGET, decoupled. The old "AGG_PROCESSES = a memory-divided
          #    worker count" OOM-killed two ccx63 planet builds (exit 137): with the pool running
          #    HEAVIEST-FIRST (deepest child_z), the first N workers are ALL hi-res coastal macrotiles
          #    at once, and each PEAKS >12 GB during the multi-source feather-merge (a 32768px tile is
          #    ~4 GB float32 at rest, ×~3 holding the merged array + reprojected sources + masks;
          #    S-102 alone is ~52 overlapping products). No single worker count is right: safe-for-
          #    the-peak wastes cores on cheap ocean tiles, core-count OOMs on the coast.
          #      * AGG/TERRAIN_PROCESSES = CORES — the POOL SIZE (max workers), so cheap tiles (weight
          #        1) fill every core. (Python: unset/0 would also default to cpu_count; set it
          #        explicitly for the log line + clarity.)
          #      * AGG/TERRAIN_MEM_BUDGET_GB = MEM_GB − RESERVE — a shared GB budget each worker draws
          #        from (scheduler.reserve) across its tile's memory-peak section, sized to
          #        weight(tile). This BOUNDS THE CONCURRENT HEAVY-TILE PEAK: the densest coastal
          #        macrotiles can't all merge at once (the OOM), while cores stay full of light tiles.
          #    RESERVE (~40) covers OS/docker + the periodic push that share the box during aggregate
          #    (coverage is sequential now — run #6's OOM was the two overlapping). The budget is sized to PHYSICAL RAM only — the
          #    64 GB swap above is a safety net for a tile that peaks past its estimate, NOT budget
          #    headroom (swapping the hot merge arrays would thrash). ccx63 (48/192): pool 48, budget
          #    ~150 GB. ccx33 (8/32): reserve shrinks with RAM so a small box still gets a real budget.
          #    GDAL_CACHEMAX=256 MB (sources are LOCAL now via selective hydrate, so the block cache
          #    matters far less) trims every worker's footprint. ──
          CORES=$(nproc)
          MEM_GB=$(( $(getconf _PHYS_PAGES) * $(getconf PAGE_SIZE) / 1073741824 ))
          RESERVE=$(( MEM_GB / 4 )); [ "$RESERVE" -gt 40 ] && RESERVE=40
          BUDGET=$(( MEM_GB - RESERVE )); [ "$BUDGET" -lt 4 ] && BUDGET=4
          BND=$(( MEM_GB / 8 )); [ "$BND" -gt "$CORES" ] && BND=$CORES; [ "$BND" -lt 1 ] && BND=1
          export AGG_PROCESSES=$CORES
          export TERRAIN_PROCESSES=$CORES
          export AGG_MEM_BUDGET_GB=$BUDGET
          export TERRAIN_MEM_BUDGET_GB=$BUDGET
          # Weight factor (scheduler.weight): 4. Run #7 settled this with fresh-worker (ratchet-proof)
          # measurements: dense z14 tiles REALLY peak 12.4+ GB in a single worker — the factor-1
          # experiment misread a light-tile log window as the whole distribution and OOM'd runs #6+#7
          # in ~30 min (48 workers × real 12 GB heavies admitted at weight 5 → ~245 GB demand).
          # factor 4 → weight(z14)=18 → ~8 concurrent heavies ≈ 110 GB, proven stable for hours by
          # run #4; the SHUFFLE keeps the other pool slots busy on weight-1 light tiles between
          # heavies, so this no longer costs the idle cores it did pre-shuffle.
          export AGG_MEM_FACTOR=4
          export BUNDLE_PROCESSES=$BND
          export GDAL_CACHEMAX=256
          # The toolchain identity for the content-hash keys (pipelines/keys.py): the deps-keyed
          # image tag pins one GDAL/tippecanoe, so bumping the toolchain correctly invalidates
          # every key (dispatch a rebuild deliberately after a GDAL bump).
          export TOOLCHAIN="$IMAGE:$IMAGE_TAG"
          if [ "${FORCE:-}" = "true" ]; then export FORCE_REBUILD=1; else export FORCE_REBUILD=; fi
          echo "box: ${CORES} cores / ${MEM_GB} GB → AGG_PROCESSES=$AGG_PROCESSES, BUNDLE_PROCESSES=$BUNDLE_PROCESSES, BBOX='${BBOX:-}', FORCE='${FORCE:-}'"

          # ── resource sampler ── one compact line every 30 s, interleaved into THIS log next to the
          #    stage markers (no artifact, no sysstat; reads /proc on the host, so it covers the whole
          #    docker build). mem carries a running high-water (pk) — the OOM headroom at a glance, the
          #    number three OOM'd runs made us infer. set +eu so a transient read never kills it; the
          #    EXIT trap reaps it however the step ends.
          ( set +eu; pt=0; pi=0; pk=0
            while :; do
              read -r tot idl < <(awk '/^cpu /{print $2+$3+$4+$5+$6+$7+$8+$9, $5+$6; exit}' /proc/stat)
              if [ "${pt}" -ne 0 ] && [ "$((tot-pt))" -gt 0 ]; then
                cpu=$(awk "BEGIN{printf \"%.0f\", ${CORES}*(($tot-$pt)-($idl-$pi))/($tot-$pt)}")
              else cpu="?"; fi
              pt=$tot; pi=$idl
              used=$(awk '/MemTotal/{t=$2} /MemAvailable/{a=$2} END{printf "%.0f",(t-a)/1048576}' /proc/meminfo)
              if [ "${used}" -gt "${pk}" ]; then pk=$used; fi
              sw=$(awk '/SwapTotal/{t=$2} /SwapFree/{f=$2} END{printf "%.1f",(t-f)/1048576}' /proc/meminfo)
              echo "[res] $(date -u +%H:%M:%S)  cpu=${cpu}/${CORES}  mem=${used}/${MEM_GB}g(pk${pk})  swap=${sw}g  load=$(cut -d' ' -f1 /proc/loadavg)"
              # Under pressure, NAME the memory: top processes by RSS, so an OOM post-mortem reads
              # "which process" straight from the log instead of inferring it from totals (runs #6/#7
              # burned two boxes on exactly that inference). Threshold ~80% of RAM; at most every 2nd tick.
              if [ "${used}" -gt $(( MEM_GB * 8 / 10 )) ]; then
                ps -eo rss,pid,comm --sort=-rss --no-headers | awk 'NR<=10{printf "[res]   %5.1fg %7s %s\n", $1/1048576, $2, $3}'
              fi
              sleep 30
            done ) &
          RES_PID=$!
          trap 'kill "${RES_PID}" 2>/dev/null || true' EXIT

          # docker run wrapper: repo code at /app, the store bind-mounted, BBOX/FORCE/TOOLCHAIN
          # forwarded (+ BUNDLE_PROCESSES — only bundle.py reads it; harmless elsewhere).
          dr() { docker run --rm -v "$GITHUB_WORKSPACE:/app" -v "$STORE:/app/pipelines/store" \
            -e BBOX -e FORCE_REBUILD -e TOOLCHAIN -e BUNDLE_PROCESSES \
            -e TERRAIN_PROCESSES -e TERRAIN_MEM_BUDGET_GB -e AGG_MEM_FACTOR \
            -e GDAL_CACHEMAX "$IMAGE:$IMAGE_TAG" just "$@"; }

          R2="R2:$DATA_BUCKET/bathymetry"
          # --retries 5: R2 occasionally returns a transient 500 InternalError; ride it out
          # instead of failing the stage (same convention as sources.yml's mirror). Applied to
          # EVERY transfer, the single-file copyto publishes included — a flake on manifest.json
          # would break the completeness contract.
          XFER=(--transfers 32 --checkers 64 --fast-list --retries 5 --stats 30s --stats-one-line)
          hydrate()    { rclone copy "$R2/$1" "$STORE/$2" "${XFER[@]}" "${@:3}"; }
          # Content-addressed store: an unchanged key is skipped and a push is delta-sized. ONE
          # pass, no ordering to get right — the per-tile artifacts self-mark (the key is IN the
          # name) and the pointer flip (not push order) is the atomicity mechanism, so a partial
          # push just strands unreferenced objects the GC collects. copy, NEVER sync --delete: a
          # re-key leaves last build's object as garbage, never clobbers a concurrent write.
          push() { rclone copy "$STORE/$1" "$R2/$2" "${XFER[@]}" "${@:3}"; }
          push_build() { rclone copyto "$STORE/bundle/$1" "$R2/build/$SHA/$1" "${XFER[@]}"; }

          # ── HYDRATE (planet only): MANIFEST-DRIVEN. Read the store pointer, fetch the manifest
          #    it names, and rclone copy EXACTLY the artifacts it references (--files-from) — so
          #    unreferenced garbage in the prefixes (superseded keys awaiting GC) costs no hydrate
          #    bytes. Plus each source's bounds.csv + catalog.json (the tile keys read the item's
          #    recipe hash + flags) + the footprint gpkgs. Source COGs + masks are hydrated
          #    selectively AFTER cover (the dirty-set list doesn't exist yet — see the
          #    sources-manifest block below). Bootstrap: no pointer yet = the FIRST immutable
          #    build — hydrate nothing and clean-rebuild (the phase-4 rename makes every phase-3
          #    artifact stale anyway, so a full re-key rebuild happens regardless; adopting the
          #    old mutable names by renaming is not worth the fragility). Once this build's
          #    manifest lands, the legacy names become GC debris. A bbox build rebuilds its window
          #    from scratch and streams sources — bounds + catalog + footprints only, never a
          #    planet-scoped pointer. ──
          if [ -z "${BBOX:-}" ]; then
            echo "── hydrate ──"
            if rclone cat "$R2/store/manifest.json" > /tmp/pointer.json 2>/dev/null && [ -s /tmp/pointer.json ]; then
              mref=$(jq -r '.manifest // empty' /tmp/pointer.json)
              [ -n "$mref" ] || { echo "store pointer exists but names no manifest — corrupt pointer.json, refusing to guess" >&2; exit 1; }
              rclone cat "$R2/store/$mref" > /tmp/manifest.json \
                || { echo "pointer names $mref but it failed to fetch — pointer/manifest mismatch, refusing to hydrate" >&2; exit 1; }
              jq -r '.entries[].name' /tmp/manifest.json > /tmp/hydrate-files.txt
              n=$(wc -l < /tmp/hydrate-files.txt)
              [ "$n" -gt 0 ] || { echo "store manifest $mref references 0 artifacts — refusing to hydrate an empty world" >&2; exit 1; }
              echo "hydrating $n referenced store artifacts (manifest $mref)"
              rclone copy "$R2" "$STORE" "${XFER[@]}" --files-from /tmp/hydrate-files.txt
            else
              echo "no store pointer in R2 — first immutable build, clean rebuild (nothing to hydrate)"
            fi
            hydrate source source --include '*/bounds.csv' --include '*/catalog.json'
            hydrate polygon polygon
          else
            hydrate source source --include '*/bounds.csv' --include '*/catalog.json'
            hydrate polygon polygon
          fi

          # ── aggregate env. Planet builds read sources + masks from LOCAL disk (hydrated
          #    below, after cover names the dirty tiles): two real runs streaming per tile
          #    banked ZERO tiles in 2.5-3.9 healthy hours — a coastal macrotile re-reads the
          #    same S-102/CUDEM bytes over /vsicurl for every tile, >2.5 h each. With no
          #    SOURCE_VSI_BASE / LANDMASK / WATERMASK set, config.source_path and the landmask
          #    defaults resolve store/source/<id>/<file> and store/landmask/{land,water}.fgb —
          #    the hydrated local copies (the preview-local read path). A legacy bounds row
          #    whose filename is already an absolute /vsi path passes through source_path
          #    untouched and still streams — acceptable fallback. bbox builds are
          #    self-contained (no volume) and keep streaming everything, as before. ──
          AGG_ENV=(-e AGG_PROCESSES -e AGG_MEM_BUDGET_GB -e AGG_MEM_FACTOR -e GDAL_CACHEMAX)
          if [ -n "${BBOX:-}" ]; then
            # Flagged coarse sources (GEBCO/EMODnet) clamp land + subtract inland water over
            # /vsicurl. WATERMASK only when it exists in R2 (landmask._present assumes any
            # /vsi path is reachable).
            AGG_ENV+=(-e SOURCE_VSI_BASE="/vsicurl/$PUBLIC_BASE/source"
                      -e LANDMASK="/vsicurl/$PUBLIC_BASE/landmask/land.fgb")
            if rclone lsf "$R2/landmask/" --include water.fgb 2>/dev/null | grep -q water.fgb; then
              AGG_ENV+=(-e WATERMASK="/vsicurl/$PUBLIC_BASE/landmask/water.fgb")
            else
              echo "no water.fgb in R2 yet — inland-water subtraction degrades to land-only this build"
            fi
          fi
          # Remote-read streaming tuning for whatever still goes over /vsicurl (bbox builds,
          # legacy absolute-path rows): 5 MB range reads (S-102's HDF5 driver is the chattiest
          # reader — big chunks amortize its many small requests), a real per-process curl
          # cache and small per-open-dataset VSI cache (both budgeted in the RAM math above),
          # HTTP/2 multiplexing (R2 speaks it), and a 512 KB first read at open instead of
          # 16 KB (many opens per tile). Inert for local reads, so set unconditionally.
          AGG_ENV+=(-e CPL_VSIL_CURL_CHUNK_SIZE=5242880
                    -e CPL_VSIL_CURL_CACHE_SIZE=268435456
                    -e GDAL_HTTP_MULTIPLEX=YES -e GDAL_HTTP_VERSION=2
                    -e VSI_CACHE=TRUE -e VSI_CACHE_SIZE=33554432
                    -e GDAL_INGESTED_BYTES_AT_OPEN=524288)
          # A dead multiplexed connection must error-and-retry, never hang: the tuned run's
          # workers slid 510% → 180% → 1% CPU and sat at keepalive-only network — GDAL sets
          # NO HTTP timeout by default, and under GDAL_HTTP_MULTIPLEX one dead HTTP/2
          # connection blocks every read sharing it, forever. These timeouts turn the hang
          # into a curl error; the retries that then ride it out are baked in the Dockerfile
          # (GDAL_HTTP_MAX_RETRY=5, GDAL_HTTP_RETRY_DELAY=1 — set in ONE place, for every
          # gdal invocation; deliberately not duplicated here).
          AGG_ENV+=(-e GDAL_HTTP_TIMEOUT=120 -e GDAL_HTTP_CONNECTTIMEOUT=30)

          # ── BUILD, stage by stage, pushing after each so an interruption loses at most one
          #    stage. The stage order matches `just planet`; the box just interleaves pushes. ──
          echo "── cover ──"
          dr cover                        # writes the covering (the tiling plan; keys drive dirtiness)

          # ── selective source hydrate (planet only) ──
          # Pull exactly the source files the stale tiles reference, so aggregate reads them
          # from local disk: sources-manifest derives the (source, filename) union with the
          # same key-based dirty derivation the run itself uses (FORCE_REBUILD included).
          # The MASKS hydrate FIRST, before sources-manifest: local mask content hashes enter
          # every fork key, so the manifest and aggregate must see identical mask state — a
          # mask-less manifest run would compute different keys, call every tile stale, and
          # hydrate the full planet source set. They land at the container's DEFAULT
          # store/landmask paths, so aggregate needs no LANDMASK/WATERMASK env: land.fgb is
          # required (flagged coarse sources exist planet-wide — fail here, not per-tile),
          # water.fgb optional (absent → the clamp degrades to land-only, the old behavior).
          # Legacy rows whose filename is an absolute /vsi path aren't R2 keys — filter them
          # out of the files-from list; source_path streams them untouched (the AGG_ENV note).
          if [ -z "${BBOX:-}" ]; then
            echo "── hydrate dirty-set sources ──"
            hydrate landmask landmask --include 'land.fgb' --include 'water.fgb'
            [ -f "$STORE/landmask/land.fgb" ] || { echo "no land.fgb in R2 — flagged coarse sources need the land mask" >&2; exit 1; }
            dr sources-manifest
            grep -v -e '://' -e '/vsi' "$STORE/source-manifest.txt" > /tmp/source-files.txt || true
            legacy=$(grep -c -e '://' -e '/vsi' "$STORE/source-manifest.txt" || true)
            if [ "${legacy:-0}" -gt 0 ]; then
              echo "$legacy legacy absolute-path row(s) keep streaming via /vsicurl"
            fi
            echo "hydrating $(wc -l < /tmp/source-files.txt) of $(wc -l < "$STORE/source-manifest.txt") referenced source file(s)"
            rclone copy "$R2/source" "$STORE/source" --files-from /tmp/source-files.txt "${XFER[@]}"
          fi

          echo "── aggregate ──"
          # Periodic background pushes while aggregate runs, so a long stage makes durable net
          # progress instead of holding every tile until its end. rclone copy is idempotent
          # (finished tiles skip), so the loop is cheap. A file caught mid-write copies torn, but
          # the next pass overwrites it and the final post-stage push (under set -e) is
          # authoritative — acceptable residual. Loop failures never abort the build.
          # Aggregate now produces the stage-2 MOSAIC tiles + the vector forks (NOT terrain pmtiles
          # — those are stage 3's per-zoom render). Push only mosaic/tiles here (immutable, content-
          # addressed, delta-sized); the mosaic index + the mosaic.gti pointer are pushed LATER,
          # after mosaic-index builds them, with the pointer last.
          push_agg() { push mosaic/tiles mosaic/tiles; push contour contour; push soundings soundings; push depare depare; }
          PUSH_LOOP=
          if [ -z "${BBOX:-}" ]; then
            ( while sleep 1200; do push_agg || true; done ) & PUSH_LOOP=$!
          fi
          agg_rc=0
          docker run --rm -v "$GITHUB_WORKSPACE:/app" -v "$STORE:/app/pipelines/store" \
            -e BBOX -e FORCE_REBUILD -e TOOLCHAIN "${AGG_ENV[@]}" "$IMAGE:$IMAGE_TAG" just aggregate || agg_rc=$?
          # Kill the loop on BOTH exits (success or failure) before anything else runs.
          if [ -n "$PUSH_LOOP" ]; then kill "$PUSH_LOOP" 2>/dev/null || true; wait "$PUSH_LOOP" 2>/dev/null || true; fi
          if [ "$agg_rc" -ne 0 ]; then exit "$agg_rc"; fi
          if [ -z "${BBOX:-}" ]; then
            push_agg
          fi

          # ── coverage ── SEQUENTIAL, after aggregate: run #6 proved the two can't share the box —
          # full-speed aggregate (~110 GB across 48 workers) + the planet tippecanoe (~130 GB,
          # --no-tile-size-limit over every footprint) oversubscribed 184 GB RAM + 64 GB swap and the
          # kernel OOM-killed both. The overlap only ever paid when the old weight factor throttled
          # aggregate into leaving coverage headroom. Each stage now gets the whole box; under set -e
          # a coverage failure still fails the build before manifest.json.
          echo "── coverage ──"
          dr coverage
          push_build coverage.pmtiles

          # ── mosaic index (LOCAL, for the on-box terrain render) ── build the GTI + planet z8 +
          #    index parquet from the mosaic tiles the aggregate persisted; terrain (stage 3) reads
          #    the GTI, so this MUST run before it. NO MOSAIC_VSI_BASE here: the index records LOCAL
          #    absolute tile paths so terrain reads the mosaic off local disk. The PUBLISHED index
          #    (with /vsicurl tile URLs) is rebuilt at the mosaic-publish step below (after terrain).
          echo "── mosaic index (local) ──"
          dr mosaic-index

          # ── terrain (stage 3) ── the per-zoom Terrarium render from the mosaic (native + coalesced
          #    overviews), replacing the old 2x2-average downsample pyramid. TERRAIN_PROCESSES caps
          #    concurrent render windows (each multi-GB). Reads mosaic.gti by local path.
          echo "── terrain (per-zoom render from the mosaic) ──"
          dr terrain
          if [ -z "${BBOX:-}" ]; then
            # The served terrain pmtiles. No covering publish: content names carry all incremental
            # state, and a re-dispatch hydrates the last manifest's artifacts + re-renders only what
            # never landed.
            push pmtiles pmtiles

            # ── MOSAIC PUBLISH ── the mosaic is a GDAL-openable published product (QGIS QA,
            #    preview-from-mosaic, third parties). Re-run mosaic-index with MOSAIC_VSI_BASE so the
            #    GeoParquet `location` records the published /vsicurl tile URLs (the on-box index
            #    above used local paths, invalid off-box). planet-z8 is content-addressed → reused,
            #    no re-decimation. Push everything the .gti references (tiles + planet-z8 <Overview>
            #    + index) BEFORE flipping the mosaic.gti pointer — pointer-last atomic publish.
            echo "── mosaic publish (/vsicurl index) ──"
            docker run --rm -v "$GITHUB_WORKSPACE:/app" -v "$STORE:/app/pipelines/store" \
              -e TOOLCHAIN -e MOSAIC_VSI_BASE="/vsicurl/$PUBLIC_BASE/mosaic/tiles" \
              "$IMAGE:$IMAGE_TAG" just mosaic-index
            push mosaic/tiles mosaic/tiles                 # immutable tile COGs (dedup; push_agg already sent these)
            push mosaic mosaic --include 'planet-z8-*.tif' # the z8 overview COG (the .gti <Overview>)
            push mosaic/index mosaic/index                 # the /vsicurl GeoParquet index
            rclone copyto "$STORE/mosaic/mosaic.gti" "$R2/mosaic/mosaic.gti" "${XFER[@]}"  # pointer LAST
            echo "mosaic published: tiles + planet-z8 + index pushed, mosaic.gti pointer flipped"

            # ── STORE PUBLISH: the content-addressed store (mosaic tiles + vector forks + terrain
            #    pmtiles) is complete after terrain. Assemble the manifest (a walk of the local
            #    store, in aggregate's key-affecting env so its recomputed keys match the content
            #    names — it now records mosaic + terrain + vector entries), push it, then flip the
            #    one-object pointer LAST — one atomic PUT. A reader (the next hydrate, the GC) sees
            #    the whole old world or the whole new one; a crash before the flip leaves the old
            #    pointer over a complete old store, and this build's pushed-but-unreferenced objects
            #    are GC debris. The bounds.csv-last / catalog-last pattern, generalized. ──
            echo "── store manifest + pointer ──"
            MANIFEST_ID=$(docker run --rm -v "$GITHUB_WORKSPACE:/app" -v "$STORE:/app/pipelines/store" \
              -e BBOX -e FORCE_REBUILD -e TOOLCHAIN "${AGG_ENV[@]}" "$IMAGE:$IMAGE_TAG" just store-manifest | tail -1)
            [ -n "$MANIFEST_ID" ] || { echo "store-manifest produced no id" >&2; exit 1; }
            rclone copy "$STORE/manifests" "$R2/store/manifests" "${XFER[@]}"
            n=$(jq -r '.entries | length' "$STORE/manifests/$MANIFEST_ID.json")
            [ "$n" -gt 0 ] || { echo "store manifest $MANIFEST_ID references 0 artifacts — refusing to flip the pointer" >&2; exit 1; }
            printf '{"manifest":"manifests/%s.json","sha":"%s","entries":%s}\n' "$MANIFEST_ID" "$SHA" "$n" \
              | rclone rcat "$R2/store/manifest.json"
            echo "store published: manifest $MANIFEST_ID ($n artifacts), pointer flipped"
          fi

          echo "── bundle (terrain) ──"
          dr bundle
          rclone copy "$STORE/bundle" "$R2/build/$SHA" "${XFER[@]}" --include 'planet.pmtiles' --include 'overlay-*.pmtiles'

          echo "── vector layers ──"
          # Completeness is SELF-ENFORCED here, not step order: each bundler verifies every
          # covering tile left an artifact or .empty marker (contour_run.verify_vector_complete)
          # before bundling — the same invariant the store manifest hard-failed on above, so
          # reordering these steps past the manifest can't silently bundle a holed layer.
          dr soundings                    # soundings + depare bundle BEFORE contours: the single
          dr depare                       # tile-join folds them into vector.pmtiles
          dr contours
          push_build vector.pmtiles

          # ── No prune here. Deletion is OUT-OF-BAND: gc.yml (weekly + dispatch, sharing the
          #    r2-store concurrency group so it never runs during a build) is the ONLY deletion
          #    path. A re-tile / re-key writes new content names + a new manifest and the pointer
          #    flips to it; the superseded objects become unreferenced garbage the GC collects.
          #    The phase-3 covering-orphan prunes (list, 25% guard, pmtiles-before-FGB ordering)
          #    and the legacy-covering purge are gone — content addressing makes a re-tile
          #    additive, never a delete. ──

          # ── manifest.json LAST — its presence marks a complete build (release.yml refuses a sha
          #    without one). Everything it references (planet + overlays + vector + coverage) is
          #    already up. ──
          push_build manifest.json
          echo "── build complete → $R2/build/$SHA ──"

  # Destroy the box + deregister the runner, ALWAYS — on build success, build failure, OR a
  # create-runner failure (server_id is emitted before the registration wait, so it is present even
  # if the runner never registered). No volume to destroy (store is on the box's local NVMe, gone
  # with the box). LOUD-DESTROY discipline: a still-present server after teardown is a leaked
  # billable resource and fails the step (also flags a stray volume, though none is created now).
  delete-runner:
    needs: [create-runner, build]
    if: always()
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - name: Delete runner + server
        if: ${{ needs.create-runner.outputs.server_id != '' }}
        uses: Cyclenerd/hcloud-github-runner@v1.4.1
        with:
          mode: delete
          github_token: ${{ secrets.RUNNER_PAT }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ env.NAME }}
          server_id: ${{ needs.create-runner.outputs.server_id }}

      - name: Verify no leaked resources
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          # Pinned + sha256-verified: this job holds HCLOUD_TOKEN, so an unpinned `latest` from a
          # compromised release or MITM would hand over infra control (same discipline as rclone).
          curl -fsSL -o /tmp/hcloud.tgz https://github.com/hetznercloud/cli/releases/download/v1.66.0/hcloud-linux-amd64.tar.gz
          echo "8b1a8598858232c491f58cbf65ce1bd0ec6f725114bb62ec967a20ab03e29a86  /tmp/hcloud.tgz" | sha256sum -c
          tar xzf /tmp/hcloud.tgz -C /tmp hcloud
          sudo mv /tmp/hcloud /usr/local/bin/
          # LOUD-DESTROY: the action deletes the server; a still-present server after that is billable
          # — fail with a clear message so a leak shows as a red step, not invisible cost. No volume is
          # created now, but keep the volume check as cheap insurance against a stray one. Resources
          # that never existed (a create-runner failure before the server) describe-miss and pass clean.
          fail=0
          if hcloud server describe "$NAME" >/dev/null 2>&1; then
            echo "::error::leaked billable resource: Hetzner server $NAME still exists — delete it manually"
            fail=1
          fi
          if hcloud volume describe "$NAME" >/dev/null 2>&1; then
            echo "::error::leaked billable resource: Hetzner volume $NAME still exists — delete it manually"
            fail=1
          fi
          exit "$fail"

  # A complete planet build from main auto-promotes itself: dispatch release.yml for this sha.
  # Only main builds deploy; a feature-branch build writes build/<sha>/ but won't ship. A bbox
  # build is a window slice and never claims planet validity, so it never releases.
  release:
    needs: build
    if: ${{ github.ref == 'refs/heads/main' && github.event.inputs.bbox == '' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions: { actions: write }
    steps:
      - name: Dispatch release for this build
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh workflow run release.yml -f sha=${{ github.sha }}
