name: Sources (Snakemake, shadow)

# Shadow of sources.yml: the same infrastructure (image, Hetzner runner, persistent store
# volume, teardown, leak checks) but the discovery/matrix/currentness/publish choreography
# collapses to ONE Snakemake invocation. Dispatch-only, no schedule — sources.yml keeps the
# weekly cadence until cutover A (docs/plans/2026-07-14-snakemake-build.md, phase 3).
#
# It writes to a SEPARATE store path (/mnt/seascape-store/snakemake-store, its own .snakemake/
# provenance) and publishes below the shadow R2 prefix bathymetry-next, so it can never mutate
# the production source mirror the legacy build reads. --keep-going replaces the GH matrix's
# isolation: one red source fails its jobs, the rest complete, the run goes red as the alert.

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Only refresh this source id (empty = all)"
        required: false
        default: ""
      force:
        description: "Force re-registration: -F (rebuild everything) + ignore the volatile shrink guard"
        type: boolean
        default: false

env:
  IMAGE: ghcr.io/${{ github.repository }}
  DATA_BUCKET: data
  # Volatile registration refuses a >5% row shrink unless forced — see pipelines/source_mirror.py.
  MIRROR_ALLOW_SHRINK: ${{ github.event.inputs.force == 'true' && '1' || '' }}
  # R2 via rclone's env-var remote (remote "r2" exists ambiently in every rclone call).
  RCLONE_CONFIG_R2_TYPE: s3
  RCLONE_CONFIG_R2_PROVIDER: Cloudflare
  RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
  RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
  SERVER_TYPE: ccx33
  SERVER_IMAGE: ubuntu-24.04
  SERVER_LOCATION: fsn1
  STORE_VOLUME: seascape-store
  STORE_VOLUME_GB: "750"
  NAME: seascape-sources-smk-${{ github.run_id }}

# Shares the r2-store concurrency group with sources.yml + build.yml: the shadow store lives
# on the same volume, so it queues behind the legacy lanes instead of racing for the attach.
concurrency:
  group: r2-store
  cancel-in-progress: false

jobs:
  # Ensure the deps-only toolchain image exists (keyed on IMAGE_TAG from ghcr-login; shared
  # with ci.yml/build.yml/sources.yml, so a push-built image is reused). Copied from sources.yml.
  image:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ghcr-login
      - name: Already in GHCR?
        id: have
        run: |
          if docker manifest inspect "$IMAGE:$IMAGE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"; echo "image current: $IMAGE:$IMAGE_TAG"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-buildx-action@v3
        if: steps.have.outputs.exists != 'true'
      - uses: docker/build-push-action@v6
        if: steps.have.outputs.exists != 'true'
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Boot the Hetzner box and attach the persistent store volume (same pattern as sources.yml).
  create-runner:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    outputs:
      label: ${{ steps.runner.outputs.label }}
      server_id: ${{ steps.runner.outputs.server_id }}
    steps:
      - name: Create runner
        id: runner
        uses: Cyclenerd/hcloud-github-runner@v1.4.1
        with:
          mode: create
          github_token: ${{ secrets.RUNNER_PAT }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ env.NAME }}
          server_type: ${{ env.SERVER_TYPE }}
          location: ${{ env.SERVER_LOCATION }}
          image: ${{ env.SERVER_IMAGE }}
          volume: 'null'
      - name: Attach persistent store volume
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SERVER_ID: ${{ steps.runner.outputs.server_id }}
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/hcloud.tgz https://github.com/hetznercloud/cli/releases/download/v1.66.0/hcloud-linux-amd64.tar.gz
          echo "8b1a8598858232c491f58cbf65ce1bd0ec6f725114bb62ec967a20ab03e29a86  /tmp/hcloud.tgz" | sha256sum -c
          tar xzf /tmp/hcloud.tgz -C /tmp hcloud
          sudo mv /tmp/hcloud /usr/local/bin/
          if ! hcloud volume describe "$STORE_VOLUME" >/dev/null 2>&1; then
            echo "store volume $STORE_VOLUME does not exist — creating (${STORE_VOLUME_GB} GB, $SERVER_LOCATION; one-time bootstrap)"
            hcloud volume create --name "$STORE_VOLUME" --size "$STORE_VOLUME_GB" --location "$SERVER_LOCATION"
          fi
          hcloud volume attach "$STORE_VOLUME" --server "$SERVER_ID"
          echo "volume $STORE_VOLUME attached to server $SERVER_ID"

  # The whole sources build in one job: fetch/prep/catalog every source and publish, keep-going,
  # forcing a re-list of the volatile mirrors (-R mirror_source). Writes the SHADOW store path
  # and publishes below bathymetry-next.
  sources:
    needs: [image, create-runner]
    runs-on: ${{ needs.create-runner.outputs.label }}
    timeout-minutes: 720
    permissions: { contents: read, packages: read }
    steps:
      - uses: actions/checkout@v6
      # Idempotent box setup — docker + pinned rclone + the store volume mount. Same as
      # sources.yml, minus the R2 seed (the shadow store has no upstream mirror to seed from;
      # it materializes by building). STORE points at the SEPARATE snakemake-store path.
      - name: Set up box (docker + rclone + store volume)
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          command -v unzip >/dev/null || { apt-get update -qq; apt-get install -y -qq unzip; }
          command -v docker >/dev/null || curl -fsSL https://get.docker.com | sh
          if ! command -v rclone >/dev/null; then
            curl -fsSL -o /tmp/rclone.zip "https://downloads.rclone.org/v1.74.4/rclone-v1.74.4-linux-amd64.zip"
            echo "fe435e0c36228e7c2f116a8701f01127bb1f694005fc11d1f27186c8bca4115d  /tmp/rclone.zip" | sha256sum -c
            unzip -q -j /tmp/rclone.zip '*/rclone' -d /tmp/rclone-bin
            install /tmp/rclone-bin/rclone /usr/local/bin/rclone
          fi
          if ! mountpoint -q /mnt/seascape-store; then
            dev=""
            for _ in $(seq 1 30); do
              for d in /dev/disk/by-id/scsi-0HC_Volume_*; do [ -e "$d" ] && dev="$d" && break; done
              [ -n "$dev" ] && break
              sleep 2
            done
            [ -n "$dev" ] || { echo "store volume device never appeared — attach step skipped or volume held elsewhere?" >&2; exit 1; }
            blkid "$dev" >/dev/null 2>&1 || { echo "blank volume — one-time mkfs"; mkfs.ext4 -q -L seascape-store "$dev"; }
            mkdir -p /mnt/seascape-store
            mount -o noatime "$dev" /mnt/seascape-store
          fi
          STORE=/mnt/seascape-store/snakemake-store
          mkdir -p "$STORE"
          echo "STORE=$STORE" >> "$GITHUB_ENV"
      - uses: ./.github/actions/ghcr-login
      # A SIGKILLed previous run (box reaped, OOM) leaves .snakemake locks + incomplete
      # markers ON THE VOLUME, wedging every later run at startup. Unlock is safe here:
      # the r2-store concurrency group guarantees no other lane run holds the store.
      - name: Unlock a stale workflow lock (crash recovery)
        run: |
          docker run --rm -v "$PWD:/app" -v "$STORE:/app/snakemake-store" \
            "$IMAGE:$IMAGE_TAG" \
            uv run snakemake --unlock --config workdir=/app/snakemake-store
      - name: Run the sources lane (Snakemake) and publish to bathymetry-next
        env:
          INPUT_SOURCE: ${{ github.event.inputs.source }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail
          # Optional target args, collected into an array so an empty one contributes nothing
          # (no unquoted word-splitting) and a source id can't smuggle extra tokens.
          extra=(--config workdir=/app/snakemake-store data_prefix=bathymetry-next)
          if [ -n "$INPUT_SOURCE" ]; then
            # source ids are directory names ([a-z0-9_]); reject anything else before it
            # reaches the docker/snakemake command line.
            case "$INPUT_SOURCE" in
              *[!a-z0-9_]*) echo "invalid source id: $INPUT_SOURCE" >&2; exit 1 ;;
            esac
            extra+=("source=$INPUT_SOURCE")
          fi
          if [ "$INPUT_FORCE" = "true" ]; then extra+=(-F); fi
          # catalogs + publish: catalogs pulls the masks, covering, and coverage tileset in
          # addition to every source. --rerun-incomplete resumes cleanly after a hard kill.
          # --resources mem_gb=28: ccx33 has 32 GB; 4 GB reserved for OS + Snakemake + rclone.
          # Per-job reservations are scheduler accounting only — kernel cgroup caps per job
          # are a stage-2 (mosaic) item, not wired here.
          docker run --rm \
            -e RCLONE_CONFIG_R2_TYPE -e RCLONE_CONFIG_R2_PROVIDER -e RCLONE_CONFIG_R2_ENDPOINT \
            -e RCLONE_CONFIG_R2_ACCESS_KEY_ID -e RCLONE_CONFIG_R2_SECRET_ACCESS_KEY \
            -e RCLONE_CONFIG_R2_NO_CHECK_BUCKET -e DATA_BUCKET -e MIRROR_ALLOW_SHRINK \
            -v "$PWD:/app" -v "$STORE:/app/snakemake-store" \
            "$IMAGE:$IMAGE_TAG" \
            uv run snakemake catalogs publish --keep-going --rerun-incomplete \
              --resources mem_gb=28 -R mirror_source "${extra[@]}"

  # Destroy the box + deregister the runner, ALWAYS. The persistent store volume is never
  # deleted; Hetzner auto-detaches it. Same LOUD-DESTROY discipline as sources.yml.
  delete-runner:
    needs: [create-runner, sources]
    if: always()
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - name: Delete runner + server
        if: ${{ needs.create-runner.outputs.server_id != '' }}
        uses: Cyclenerd/hcloud-github-runner@v1.4.1
        with:
          mode: delete
          github_token: ${{ secrets.RUNNER_PAT }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ env.NAME }}
          server_id: ${{ needs.create-runner.outputs.server_id }}
      - name: Verify no leaked resources
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/hcloud.tgz https://github.com/hetznercloud/cli/releases/download/v1.66.0/hcloud-linux-amd64.tar.gz
          echo "8b1a8598858232c491f58cbf65ce1bd0ec6f725114bb62ec967a20ab03e29a86  /tmp/hcloud.tgz" | sha256sum -c
          tar xzf /tmp/hcloud.tgz -C /tmp hcloud
          sudo mv /tmp/hcloud /usr/local/bin/
          fail=0
          if hcloud server describe "$NAME" >/dev/null 2>&1; then
            echo "::error::leaked billable resource: Hetzner server $NAME still exists — delete it manually"
            fail=1
          fi
          if hcloud volume describe "$NAME" >/dev/null 2>&1; then
            echo "::error::leaked billable resource: Hetzner volume $NAME still exists — delete it manually"
            fail=1
          fi
          exit "$fail"
