name: Collect host metrics

on:
  workflow_dispatch:
    inputs:
      server_id:
        description: Hetzner server ID
        required: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Fetch Hetzner host metrics
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SERVER_ID: ${{ inputs.server_id }}
        run: .github/scripts/collect-hcloud-metrics "$SERVER_ID"
      - uses: actions/upload-artifact@v4
        with:
          name: hcloud-metrics-${{ github.run_id }}-${{ inputs.server_id }}
          path: hcloud-metrics/
          retention-days: 90
