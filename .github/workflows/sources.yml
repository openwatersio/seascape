name: Sources

# Runs the sources build — fetch/prep/catalog every source, mirror the volatile collections,
# and publish — as ONE Snakemake invocation on an ephemeral Hetzner box against the persistent
# store volume, publishing to the bathymetry/ prefix builds read. --keep-going gives per-source
# isolation: one red source fails its own jobs, the rest complete, and the run goes red as the
# alert.

on:
  schedule:
    - cron: "23 6 * * 1" # weekly, Monday 06:23 UTC
  workflow_dispatch:
    inputs:
      source:
        description: "Only refresh this source id (empty = all)"
        required: false
        default: ""
      force:
        description: "Force re-registration from warm raw (re-run prep + catalog, NO refetch) + ignore the volatile shrink guard"
        type: boolean
        default: false
      snakemake_args:
        description: "Extra snakemake args, e.g. -R cover (aggregation-code changes) or -F (true cold rebuild incl. refetch)"
        required: false
        default: ""

env:
  IMAGE: ghcr.io/${{ github.repository }}
  DATA_BUCKET: data
  # Volatile registration refuses a >5% row shrink unless forced — see pipelines/source_mirror.py.
  MIRROR_ALLOW_SHRINK: ${{ github.event.inputs.force == 'true' && '1' || '' }}
  # R2 via rclone's env-var remote (remote "r2" exists ambiently in every rclone call).
  RCLONE_CONFIG_R2_TYPE: s3
  RCLONE_CONFIG_R2_PROVIDER: Cloudflare
  RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
  RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
  SERVER_TYPE: ccx33
  SERVER_IMAGE: ubuntu-24.04
  SERVER_LOCATION: fsn1
  STORE_VOLUME: seascape-store
  STORE_VOLUME_GB: "750"
  NAME: seascape-sources-${{ github.run_id }}

# Shares the r2-store concurrency group with build.yml: one store on one volume, so a
# sources run and a build queue behind each other instead of racing for the attach.
concurrency:
  group: r2-store
  cancel-in-progress: false

jobs:
  # Ensure the deps-only toolchain image exists (keyed on IMAGE_TAG from ghcr-login; shared
  # with ci.yml/build.yml, so a push-built image is reused).
  image:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/ghcr-login
      - name: Already in GHCR?
        id: have
        run: |
          if docker manifest inspect "$IMAGE:$IMAGE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"; echo "image current: $IMAGE:$IMAGE_TAG"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-buildx-action@v4
        if: steps.have.outputs.exists != 'true'
      - uses: docker/build-push-action@v7
        if: steps.have.outputs.exists != 'true'
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Boot the Hetzner box and attach the persistent store volume.
  create-runner:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    outputs:
      label: ${{ steps.runner.outputs.label }}
      server_id: ${{ steps.runner.outputs.server_id }}
      ip: ${{ steps.attach.outputs.ip }}
    steps:
      # The runner action takes a numeric SSH key ID only; resolve the friendlier key NAME
      # in vars.HCLOUD_SSH_KEY (empty var -> "null" = no key).
      - name: Resolve SSH key id
        id: sshkey
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          KEY_NAME: ${{ vars.HCLOUD_SSH_KEY }}
        run: |
          set -euo pipefail
          id=null
          if [ -n "$KEY_NAME" ]; then
            id=$(curl -fsS -H "Authorization: Bearer $HCLOUD_TOKEN" "https://api.hetzner.cloud/v1/ssh_keys?name=$KEY_NAME" | jq -r '.ssh_keys[0].id // "null"')
          fi
          echo "id=$id" >> "$GITHUB_OUTPUT"
      - name: Create runner
        id: runner
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: create
          github_token: ${{ secrets.RUNNER_PAT }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ env.NAME }}
          server_type: ${{ env.SERVER_TYPE }}
          location: ${{ env.SERVER_LOCATION }}
          image: ${{ env.SERVER_IMAGE }}
          # Repo variable HCLOUD_SSH_KEY = an SSH key ID/name in the hcloud project; lets
          # operators ssh in as root@<ip> for live diagnosis of a long-running sources build.
          ssh_key: ${{ steps.sshkey.outputs.id }}
          volume: "null"
      - name: Attach persistent store volume
        id: attach
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SERVER_ID: ${{ steps.runner.outputs.server_id }}
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/hcloud.tgz https://github.com/hetznercloud/cli/releases/download/v1.66.0/hcloud-linux-amd64.tar.gz
          echo "8b1a8598858232c491f58cbf65ce1bd0ec6f725114bb62ec967a20ab03e29a86  /tmp/hcloud.tgz" | sha256sum -c
          tar xzf /tmp/hcloud.tgz -C /tmp hcloud
          sudo mv /tmp/hcloud /usr/local/bin/
          if ! hcloud volume describe "$STORE_VOLUME" >/dev/null 2>&1; then
            echo "store volume $STORE_VOLUME does not exist — creating (${STORE_VOLUME_GB} GB, $SERVER_LOCATION; one-time bootstrap)"
            hcloud volume create --name "$STORE_VOLUME" --size "$STORE_VOLUME_GB" --location "$SERVER_LOCATION"
          fi
          hcloud volume attach "$STORE_VOLUME" --server "$SERVER_ID"
          ip=$(hcloud server ip "$SERVER_ID")
          echo "ip=$ip" >> "$GITHUB_OUTPUT"
          echo "volume $STORE_VOLUME attached to server $SERVER_ID — ssh root@$ip"

  # The whole sources build in one job: fetch/prep/catalog every source and publish, keep-going,
  # forcing a re-list of the volatile mirrors (-R mirror_source). Shares the store on the
  # volume and publishes to the production bathymetry/ prefix — one store, one mirror.
  sources:
    needs: [image, create-runner]
    runs-on: ${{ needs.create-runner.outputs.label }}
    timeout-minutes: 720
    permissions: { contents: read, packages: read }
    steps:
      - uses: actions/checkout@v7
      # Idempotent box setup — docker + the store volume mount (rclone lives in the
      # toolchain image; every publish/mirror shell runs in-container). ONE store: reads and
      # writes /mnt/seascape-store/store, and .snakemake/ provenance lives beside it at the
      # volume root. STATE is the volume root (the dir that CONTAINS store/), mounted whole so
      # both land on persistent disk.
      - name: Set up box (docker + store volume)
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          command -v docker >/dev/null || curl -fsSL https://get.docker.com | sh
          if ! mountpoint -q /mnt/seascape-store; then
            dev=""
            for _ in $(seq 1 30); do
              for d in /dev/disk/by-id/scsi-0HC_Volume_*; do [ -e "$d" ] && dev="$d" && break; done
              [ -n "$dev" ] && break
              sleep 2
            done
            [ -n "$dev" ] || { echo "store volume device never appeared — attach step skipped or volume held elsewhere?" >&2; exit 1; }
            blkid "$dev" >/dev/null 2>&1 || { echo "blank volume — one-time mkfs"; mkfs.ext4 -q -L seascape-store "$dev"; }
            mkdir -p /mnt/seascape-store
            mount -o noatime "$dev" /mnt/seascape-store
          fi
          STATE=/mnt/seascape-store
          mkdir -p "$STATE/store"
          echo "STATE=$STATE" >> "$GITHUB_ENV"
      - uses: ./.github/actions/ghcr-login
      # A SIGKILLed previous run (box reaped, OOM) leaves .snakemake locks + incomplete
      # markers ON THE VOLUME, wedging every later run at startup. Unlock is safe here:
      # the r2-store concurrency group guarantees no other lane run holds the store.
      - name: Unlock a stale workflow lock (crash recovery)
        # TMP is the box's LOCAL-disk per-run scratch (docker.sh mounts it at /app/tmp): logs +
        # benchmarks land here, off the network store volume. Step-scoped, not job-wide — a
        # job-wide TMP would silently redirect other steps' Python tempfile writes.
        env:
          TMP: /var/tmp/seascape-tmp
        run: |
          mkdir -p "$TMP"  # first snakemake step; the mount source must exist before docker run
          ./docker.sh snakemake --unlock --config workdir=/app/state tmp=/app/tmp
      - name: Run the sources lane (Snakemake) and publish
        env:
          INPUT_SOURCE: ${{ github.event.inputs.source }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
          INPUT_ARGS: ${{ github.event.inputs.snakemake_args }}
          # LOCAL-disk per-run scratch (docker.sh mounts it at /app/tmp): logs + benchmarks land
          # here, off the network store volume. Step-scoped to avoid redirecting other steps'
          # Python tempfile writes.
          TMP: /var/tmp/seascape-tmp
        run: |
          set -euo pipefail
          mkdir -p "$TMP/logs"
          # Memory/swap time series (Hetzner's metrics API has neither) — logs/ ships in the
          # artifact. Same sampler build.yml runs, minus the progress heartbeat (no build status).
          ( while sleep 60; do
              free -m | awk -v t="$(date -u +%FT%TZ)" 'NR==2{u=$3;a=$7} NR==3{print t" used_mb="u" avail_mb="a" swap_used_mb="$3}' \
                >> "$TMP/logs/memory.log"
            done ) &
          mem=$!
          trap 'kill "$mem" 2>/dev/null || true' EXIT
          # Optional target args, collected into an array so an empty one contributes nothing
          # (no unquoted word-splitting) and a source id can't smuggle extra tokens.
          extra=(--config workdir=/app/state tmp=/app/tmp)
          if [ -n "$INPUT_SOURCE" ]; then
            # source ids are directory names ([a-z0-9_]); reject anything else before it
            # reaches the docker/snakemake command line.
            case "$INPUT_SOURCE" in
              *[!a-z0-9_]*) echo "invalid source id: $INPUT_SOURCE" >&2; exit 1 ;;
            esac
            extra+=("source=$INPUT_SOURCE")
          fi
          # Re-register from warm raw: fetch_asset is upstream of prep_source, so --forcerun
          # re-runs prep + catalog (+ downstream) without refetching. Cold rebuild: -F via snakemake_args.
          if [ "$INPUT_FORCE" = "true" ]; then extra+=(-R prep_source catalog_item); fi
          # Extra args reach the command as separate words; reject anything shell-active.
          case "$INPUT_ARGS" in *[!-A-Za-z0-9_=\ .]*) echo "invalid snakemake_args" >&2; exit 1 ;; esac
          read -r -a xargs <<<"$INPUT_ARGS"
          extra+=("${xargs[@]}")
          # Two invocations: the forced re-listing first, alone — across the invocation
          # boundary the engine's input checksums cure unchanged registrations, so the
          # main invocation cascades (catalog → cover → coverage → publish) only on real
          # drift. A red refresh still lets the rest publish; the step exits red after.
          # --cores 16 > vCPUs: width for IO-bound fetches; mem_gb caps the heavy jobs
          # (28 = 32 GB - 4 reserved). Box-only — laptops keep cores:all as their cap.
          rc=0
          ./docker.sh snakemake refresh --keep-going --rerun-incomplete \
            --cores 16 --resources mem_gb=28 -R mirror_source "${extra[@]}" || rc=$?
          ./docker.sh snakemake catalogs publish --keep-going --rerun-incomplete \
            --cores 16 --resources mem_gb=28 "${extra[@]}" || rc=$?
          exit "$rc"
      # Per-job wall/CPU/max-RSS from the benchmark: directives, plus per-job stderr logs —
      # both live in the box's local-disk scratch (TMP), the durable home is this artifact.
      - name: Upload snakemake benchmarks + logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snakemake-bench-${{ github.run_id }}
          path: |
            /var/tmp/seascape-tmp/bench/
            /var/tmp/seascape-tmp/logs/
          if-no-files-found: ignore
          retention-days: 90

  # Capture provider-side CPU, disk, and network series while the ephemeral server still
  # exists — same pattern as build.yml. Best-effort: teardown waits for this job, but runs
  # regardless of its result.
  collect-metrics:
    needs: [create-runner, sources]
    if: ${{ always() && needs.create-runner.outputs.server_id != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Fetch Hetzner host metrics
        continue-on-error: true
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          SERVER_ID: ${{ needs.create-runner.outputs.server_id }}
        run: scripts/collect-hcloud-metrics "$SERVER_ID"

      - name: Upload Hetzner host metrics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hcloud-metrics-${{ github.run_id }}-${{ needs.create-runner.outputs.server_id }}
          path: hcloud-metrics/
          if-no-files-found: ignore
          retention-days: 90

  # Destroy the box + deregister the runner, ALWAYS. The persistent store volume is never
  # deleted; Hetzner auto-detaches it. Same LOUD-DESTROY discipline as sources.yml.
  delete-runner:
    needs: [create-runner, sources, collect-metrics]
    if: always()
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - name: Delete runner + server
        if: ${{ needs.create-runner.outputs.server_id != '' }}
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: delete
          github_token: ${{ secrets.RUNNER_PAT }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ env.NAME }}
          server_id: ${{ needs.create-runner.outputs.server_id }}
      - name: Verify no leaked resources
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/hcloud.tgz https://github.com/hetznercloud/cli/releases/download/v1.66.0/hcloud-linux-amd64.tar.gz
          echo "8b1a8598858232c491f58cbf65ce1bd0ec6f725114bb62ec967a20ab03e29a86  /tmp/hcloud.tgz" | sha256sum -c
          tar xzf /tmp/hcloud.tgz -C /tmp hcloud
          sudo mv /tmp/hcloud /usr/local/bin/
          fail=0
          if hcloud server describe "$NAME" >/dev/null 2>&1; then
            echo "::error::leaked billable resource: Hetzner server $NAME still exists — delete it manually"
            fail=1
          fi
          if hcloud volume describe "$NAME" >/dev/null 2>&1; then
            echo "::error::leaked billable resource: Hetzner volume $NAME still exists — delete it manually"
            fail=1
          fi
          exit "$fail"
