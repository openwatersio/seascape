name: Release

# Republishes a build that was already produced on main (build/<sha>/ in R2) — no
# rebuild — and deploys the Worker + viewer. The build pipeline lives in ci.yml.
# A published release promotes the build for its tagged commit. Run manually
# (workflow_dispatch from main, with a `sha`) to publish any other built commit
# using the current workflow rather than the one at that commit.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA of the build to publish (blank = this commit)"
        required: false
        default: ""

env:
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: auto
  AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

jobs:
  # Promote build/<sha>/ → releases/<sha>/ (server-side copy, no rebuild). build/ is
  # GC'd after 7 days; releases/ has NO lifecycle rule, so the live bundle is never
  # collected out from under the Worker regardless of release cadence. Atomicity comes
  # from deploy-worker flipping TILES_PREFIX *after* this lands in the unserved prefix —
  # clients keep reading the old releases/<sha>/ until the new Worker version rolls out.
  publish-r2:
    runs-on: ubuntu-latest
    env:
      SHA: ${{ github.event.inputs.sha || github.sha }}
    steps:
      - name: Promote build → releases/
        run: |
          echo "publishing build/$SHA → releases/$SHA"
          if ! aws s3 ls "s3://$R2_BUCKET/build/$SHA/manifest.json" >/dev/null 2>&1; then
            echo "::error::No build at build/$SHA/ — release/dispatch a commit that was built on main."
            exit 1
          fi
          set -o pipefail
          # R2 has no object tagging, and the AWS CLI touches tags on every server-side copy.
          # Multipart copies (the big files) survive with --copy-props none; a single-part
          # CopyObject still sends x-amz-tagging-directive: REPLACE, which R2 rejects. Only
          # manifest.json is below the multipart threshold and hits that path — round-trip it
          # through the runner, where the upload sends no tagging header. Small future overlays
          # would need the same; lower the threshold or switch to rclone if that happens.
          aws s3 cp "s3://$R2_BUCKET/build/$SHA/" "s3://$R2_BUCKET/releases/$SHA/" \
            --recursive --exclude 'contour-shards/*' --exclude 'manifest.json' --copy-props none
          aws s3 cp "s3://$R2_BUCKET/build/$SHA/manifest.json" - \
            | aws s3 cp - "s3://$R2_BUCKET/releases/$SHA/manifest.json" --content-type application/json
      - name: Prune old releases (keep newest 3)
        run: |
          # Count-based retention (current + 2 rollback targets), ordered by each
          # release's manifest.json mtime — never age/cadence dependent, so releases/
          # needs no lifecycle rule. The copy above runs first, so $SHA is always kept.
          keep=$(aws s3 ls "s3://$R2_BUCKET/releases/" --recursive \
            | grep '/manifest\.json$' | sort -r | awk '{print $4}' | cut -d/ -f2 | head -3)
          [ -n "$keep" ] || { echo "::error::no releases found — refusing to prune"; exit 1; }
          for sha in $(aws s3 ls "s3://$R2_BUCKET/releases/" | awk '{print $2}' | tr -d /); do
            grep -qx "$sha" <<<"$keep" || {
              echo "pruning releases/$sha"
              aws s3 rm "s3://$R2_BUCKET/releases/$sha" --recursive
            }
          done

  # Deploy the serving Worker pointed at releases/<sha>/. This deploy IS the atomic
  # cutover: Cloudflare rolls the new version globally as a unit, so no client ever
  # sees a mix of old/new bundles. Rollback = re-dispatch with a prior (kept) sha.
  deploy-worker:
    needs: publish-r2
    runs-on: ubuntu-latest
    env:
      SHA: ${{ github.event.inputs.sha || github.sha }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          npm ci
          # Bind the same bucket the build writes to; wrangler.toml can't read env vars,
          # so overwrite the placeholder name at deploy (keeps worker + build in sync).
          sed -i "s|^bucket_name = .*|bucket_name = \"$R2_BUCKET\"|" wrangler.toml
          npx wrangler deploy --var "TILES_PREFIX:releases/$SHA/"

  # Build the viewer (pointed at the Worker) and deploy it to GitHub Pages.
  deploy-pages:
    runs-on: ubuntu-latest
    permissions: { pages: write, id-token: write, contents: read }
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency: { group: pages, cancel-in-progress: false }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - name: Build viewer
        env:
          VITE_TILES_BASE: https://tiles.openwaters.io
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v4
        with: { path: dist }
      - id: deployment
        uses: actions/deploy-pages@v5
