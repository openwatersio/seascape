name: Release

# Republishes a build that was already produced on main (bathymetry/build/<sha>/ in R2) — no
# rebuild — and deploys the Worker + viewer. The build pipeline lives in build.yml.
# A published release promotes the build for its tagged commit. Run manually
# (workflow_dispatch from main, with a `sha`) to publish any other built commit
# using the current workflow rather than the one at that commit.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA of the build to publish (blank = this commit)"
        required: false
        default: ""

env:
  TILES_BUCKET: ${{ secrets.R2_BUCKET }} # serving bucket (tiles.openwaters.io), Worker-bound
  DATA_BUCKET: data # build bucket (data.openwaters.io); promote copies build → tiles
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: auto
  AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

jobs:
  # Promote data:bathymetry/build/<sha>/ → tiles:seascape/<sha>/ — a cross-bucket
  # server-side copy out of the build bucket into the Worker-fronted serving bucket (no
  # rebuild). build/ is GC'd after 7 days; the tiles bucket has NO lifecycle rule, so the
  # live bundle is never collected out from under the Worker regardless of release
  # cadence. Atomicity comes from deploy-worker flipping RELEASE_PREFIX *after* this lands
  # in the unserved <sha>/ dir — clients keep reading the old release until the new
  # Worker version rolls out.
  publish-r2:
    runs-on: ubuntu-latest
    env:
      SHA: ${{ github.event.inputs.sha || github.sha }}
    steps:
      - name: Promote build → tiles bucket
        # rclone, not the aws CLI: both buckets sit behind one account-level R2 endpoint, so this
        # is a same-remote server-side copy (no download) that sends no object-tagging header at any
        # file size. R2 doesn't implement tagging and rejects the aws CLI's x-amz-tagging-directive,
        # which it emits on single-part CopyObject — so small overlays failed to promote.
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true" # don't HEAD/create the bucket (R2 perms)
        run: |
          set -euo pipefail
          sudo apt-get install -y rclone
          src="R2:$DATA_BUCKET/bathymetry/build/$SHA"
          dst="R2:$TILES_BUCKET/seascape/$SHA"
          echo "publishing $src → $dst"
          # manifest.json is copied last, so its presence means a complete promotion.
          if [ -n "$(rclone lsf "$dst/" --include manifest.json)" ]; then
            echo "$dst already published — skipping promote"; exit 0
          fi
          if [ -z "$(rclone lsf "$src/" --include manifest.json)" ]; then
            echo "::error::No build at $src/ — release/dispatch a commit that was built on main."
            exit 1
          fi
          # contour-shards/bundle-frags are build scratch.
          # manifest.json copied separately, last, so a crash mid-copy never leaves a false marker.
          rclone copy "$src" "$dst" --transfers 16 --checkers 16 \
            --exclude 'contour-shards/**' --exclude 'bundle-frags/**' \
            --exclude 'manifest.json'
          rclone copyto "$src/manifest.json" "$dst/manifest.json"
      - name: Prune old releases (keep newest 3)
        run: |
          # Count-based retention (current + 2 rollback targets), ordered by each
          # release's manifest.json mtime — never age/cadence dependent, so the tiles
          # bucket needs no lifecycle rule. The copy above runs first, so $SHA is always kept.
          keep=$(aws s3 ls "s3://$TILES_BUCKET/seascape/" --recursive \
            | grep '/manifest\.json$' | sort -r | awk '{print $4}' | cut -d/ -f2 | head -3)
          [ -n "$keep" ] || { echo "::error::no releases found — refusing to prune"; exit 1; }
          for sha in $(aws s3 ls "s3://$TILES_BUCKET/seascape/" | awk '{print $2}' | tr -d /); do
            grep -qx "$sha" <<<"$keep" || {
              echo "pruning seascape/$sha"
              aws s3 rm "s3://$TILES_BUCKET/seascape/$sha" --recursive
            }
          done

  # Deploy the serving Worker pointed at seascape/<sha>/. This deploy IS the atomic
  # cutover: Cloudflare rolls the new version globally as a unit, so no client ever
  # sees a mix of old/new bundles. Rollback = re-dispatch with a prior (kept) sha.
  deploy-worker:
    needs: publish-r2
    runs-on: ubuntu-latest
    env:
      SHA: ${{ github.event.inputs.sha || github.sha }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Install workspace (runs the style package's prepare — tsc → style/dist)
        run: npm ci
      - name: wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          TILES_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          # Bind the same bucket the build writes to; wrangler.toml can't read env vars,
          # so overwrite the placeholder name at deploy (keeps worker + build in sync).
          sed -i "s|^bucket_name = .*|bucket_name = \"$TILES_BUCKET\"|" wrangler.toml
          npx wrangler deploy --var "RELEASE_PREFIX:seascape/$SHA/"

  # Build the viewer (pointed at the Worker) and deploy it to GitHub Pages.
  deploy-pages:
    runs-on: ubuntu-latest
    permissions: { pages: write, id-token: write, contents: read }
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency: { group: pages, cancel-in-progress: false }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - name: Build viewer
        env:
          VITE_TILES_BASE: https://tiles.openwaters.io/seascape
        run: |
          npm ci
          npm run build -- --base=/${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v4
        with: { path: dist }
      - id: deployment
        uses: actions/deploy-pages@v5

  # No cache purge on release: the Worker's edge-cache keys embed
  # RELEASE_PREFIX, so the deploy itself switches cache namespaces and the
  # old release's entries LRU out — nothing else on the zone is affected.

  # Probe the live endpoint after cutover — a broken route, missing bundle, or a
  # detached bucket fails the release loudly instead of 404ing silently. The Worker is
  # already live by here (deploy is the atomic cutover), so a failure means roll back:
  # re-dispatch this workflow with a prior kept sha.
  smoke-test:
    needs: deploy-worker
    runs-on: ubuntu-latest
    env:
      BASE: https://tiles.openwaters.io
    steps:
      - name: Probe tiles + TileJSON + R2 fall-through
        run: |
          set -uo pipefail
          fail=0
          # HEAD only (-I): exercises the route/binding without pulling tile bytes or
          # the multi-GB GEBCO zip. No -f, so we read the real status code ourselves.
          check() { # label want-code url [want-content-type-substr]
            local label=$1 want=$2 url=$3 want_ct=${4:-} out code ct
            out=$(curl -sS -I -o /dev/null -w '%{http_code} %{content_type}' "$url") || out="000 -"
            code=${out%% *}; ct=${out#* }
            if [ "$code" = "$want" ] && { [ -z "$want_ct" ] || [[ "$ct" == *"$want_ct"* ]]; }; then
              echo "ok   $label → $code $ct"
            else
              echo "::error::$label → got '$code $ct', want '$want ${want_ct:-any}'  ($url)"
              fail=1
            fi
          }
          check "raster tile"     200 "$BASE/seascape/0/0/0.webp"            image/webp
          check "vector tile"     200 "$BASE/seascape/0/0/0.pbf"             protobuf
          check "raster.json"     200 "$BASE/seascape/raster.json"           json
          exit $fail
