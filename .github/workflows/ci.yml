name: Build

# Build pipeline (see CONTRIBUTING.md / the port plan):
#   image → sources (per-source matrix) → plan (cover + diff) → aggregate
#   (sharded fan-out) → bundle → publish/worker/pages.
#
# State lives in R2 under a single persistent prefix `store/` (the consolidated
# pipelines/store dir) so rebuilds are incremental: `plan` diffs the new covering
# against the previous one and only the changed aggregation tiles get rebuilt;
# clean tiles' pmtiles/contours are reused straight from the store. Final bundles
# land in build/<sha>/ and are promoted to bathymetry/<year>/ on release.
#
# The heavy build runs on the default branch, releases, and manual dispatch only
# (a shared incremental store shouldn't be mutated from every feature branch); any
# branch can trigger a build via workflow_dispatch (optionally with a BBOX).

on:
  push:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      bbox:
        description: 'Bounding box "W,S,E,N" (empty = full global)'
        required: false
        default: ""
      shards:
        description: "Aggregate matrix shards (<= 256)"
        required: false
        default: "24"

env:
  IMAGE: ghcr.io/${{ github.repository }}
  GEBCO_YEAR: "2026"
  # The R2 bucket build state + published bundles live in. The serving Worker's
  # R2 binding (worker/wrangler.toml `bucket_name`) must name this same bucket.
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  AGG_SHARDS: ${{ github.event.inputs.shards || '24' }}
  BBOX: ${{ github.event.inputs.bbox || '' }}
  # R2 via the S3 API (aws-cli v2 honours AWS_ENDPOINT_URL).
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: auto
  AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

# Supersede in-progress runs on the same branch — but never cancel a release.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  # Build + push the toolchain image. buildx GHA cache → only recompiles when the
  # Dockerfile changes.
  image:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: ./.github/actions/ghcr-login
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Offline self-checks (synthetic data, no network/R2) on every push — fast
  # validation that the image toolchain produces correct results.
  check:
    needs: image
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: read }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ghcr-login
      - name: Engine + source self-checks
        run: |
          docker run --rm "$IMAGE:${{ github.sha }}" just test-sources
          docker run --rm "$IMAGE:${{ github.sha }}" just test-engine

  # ─── Build (default branch / release / dispatch) ───────────────────────────
  # Enumerate the sources (one dir per source) into a matrix.
  discover:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      sources: ${{ steps.l.outputs.sources }}
    steps:
      - uses: actions/checkout@v6
      - id: l
        run: echo "sources=$(ls -1 sources | jq -R -s -c 'split("\n")|map(select(length>0))')" >> "$GITHUB_OUTPUT"

  # Prepare each source (fetch → datum → normalize → bounds → polygon → tarball)
  # and push its store/source/<id> to R2. One source failing doesn't sink the rest
  # (the covering simply omits it). Cache skips re-fetching unchanged sources.
  sources:
    needs: [image, discover]
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: read }
    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJSON(needs.discover.outputs.sources) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ghcr-login
      # Skip the whole fetch when R2 already holds this source built from the same
      # recipe (source data is stable per release; only re-prepare when the recipe
      # under sources/<id>/ changes). The hash marker lives beside the source data.
      - name: Already current in R2?
        id: check
        env:
          RECIPE_HASH: ${{ hashFiles(format('sources/{0}/**', matrix.source)) }}
        run: |
          have=$(aws s3 cp "s3://$R2_BUCKET/store/source/${{ matrix.source }}/.recipe-hash" - 2>/dev/null || true)
          if [ -n "$RECIPE_HASH" ] && [ "$have" = "$RECIPE_HASH" ]; then current=true; else current=false; fi
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "hash=$RECIPE_HASH" >> "$GITHUB_OUTPUT"
          echo "${{ matrix.source }}: recipe=$RECIPE_HASH r2=${have:-none} → current=$current"
      # GEBCO's 4 GB zip + extract needs headroom.
      - name: Free disk space
        if: steps.check.outputs.current != 'true' && matrix.source == 'gebco'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with: { tool-cache: true, android: true, dotnet: true, haskell: true, large-packages: true, swap-storage: true }
      - name: Prepare ${{ matrix.source }}
        if: steps.check.outputs.current != 'true'
        run: |
          mkdir -p store
          docker run --rm \
            -v "$PWD/store:/app/pipelines/store" \
            "$IMAGE:${{ github.sha }}" just source ${{ matrix.source }}
      - name: Push source to R2
        if: steps.check.outputs.current != 'true'
        run: |
          aws s3 sync "store/source/${{ matrix.source }}" "s3://$R2_BUCKET/store/source/${{ matrix.source }}" --delete --exclude '.recipe-hash'
          # The container writes store/ as root, so write the marker to R2 from stdin
          # (not into the root-owned dir); --exclude above keeps --delete off it.
          printf '%s' "${{ steps.check.outputs.hash }}" | aws s3 cp - "s3://$R2_BUCKET/store/source/${{ matrix.source }}/.recipe-hash"

  # Cover the planet into aggregation tiles, diff against the previous covering,
  # and emit the shard matrix sized to the dirty count.
  plan:
    needs: [image, sources]
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: read }
    outputs:
      shards: ${{ steps.m.outputs.shards }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ghcr-login
      - name: Pull bounds + previous covering from R2
        run: |
          mkdir -p store/source store/aggregation
          # Covering only needs each source's bounds.csv (not the full DEM)…
          aws s3 sync "s3://$R2_BUCKET/store/source" store/source --exclude '*' --include '*/bounds.csv'
          # …plus the prior covering(s) so the dirty-diff has something to compare to.
          aws s3 sync "s3://$R2_BUCKET/store/aggregation" store/aggregation
          # …and the list of already-built pmtiles, so the diff rebuilds any covering
          # tile whose artifact is missing (self-heal — coverings are pushed before
          # the tiles exist, so a failed prior build can leave gaps the diff trusts).
          aws s3 ls "s3://$R2_BUCKET/store/pmtiles/" --recursive | awk '{print $4}' > store/pmtiles-keys.txt || true
      - name: Cover
        run: docker run --rm -e BBOX -v "$PWD/store:/app/pipelines/store" "$IMAGE:${{ github.sha }}" just cover
      - name: Push covering to R2
        run: aws s3 sync store/aggregation "s3://$R2_BUCKET/store/aggregation"
      - id: m
        name: Emit shard matrix
        run: |
          SHARDS=$(docker run --rm -v "$PWD/store:/app/pipelines/store" \
            "$IMAGE:${{ github.sha }}" just shard-matrix "$AGG_SHARDS" | tail -n1)
          echo "shards=$SHARDS" >> "$GITHUB_OUTPUT"

  # Reproject → merge → tile → contour for one strided slice of the dirty tiles.
  # Shards re-derive the same sorted dirty list and never overlap, so each pushes
  # disjoint tile keys back to the store.
  aggregate:
    needs: [image, sources, plan]
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: read }
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.plan.outputs.shards) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ghcr-login
      # Dense-coast contour shards stage large FlatGeobufs.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with: { tool-cache: true, android: true, dotnet: true, haskell: true, large-packages: true, swap-storage: true }
      - name: Pull sources + covering from R2
        run: |
          mkdir -p store/source store/aggregation store/pmtiles store/contour
          aws s3 sync "s3://$R2_BUCKET/store/source" store/source
          aws s3 sync "s3://$R2_BUCKET/store/aggregation" store/aggregation
          # Same pmtiles listing the plan used, so shards re-derive the identical
          # dirty set (changed tiles + any whose pmtiles is missing).
          aws s3 ls "s3://$R2_BUCKET/store/pmtiles/" --recursive | awk '{print $4}' > store/pmtiles-keys.txt || true
      - name: Aggregate shard ${{ matrix.shard.i }}/${{ matrix.shard.n }}
        run: |
          docker run --rm -v "$PWD/store:/app/pipelines/store" \
            "$IMAGE:${{ github.sha }}" just aggregate ${{ matrix.shard.i }} ${{ matrix.shard.n }}
      - name: Push tiles + contours + done-markers to R2
        run: |
          aws s3 sync store/pmtiles "s3://$R2_BUCKET/store/pmtiles"
          aws s3 sync store/contour "s3://$R2_BUCKET/store/contour"
          aws s3 sync store/aggregation "s3://$R2_BUCKET/store/aggregation"

  # Single-runner terrain finish: overview pyramid → planet + per-source overlays +
  # manifest. Contours are built separately (sharded, below). Runs even on a clean
  # rebuild.
  bundle:
    needs: aggregate
    if: ${{ !cancelled() && needs.aggregate.result == 'success' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: read }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ghcr-login
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with: { tool-cache: true, android: true, dotnet: true, haskell: true, large-packages: true, swap-storage: true }
      - name: Pull store from R2
        run: |
          mkdir -p store
          aws s3 sync "s3://$R2_BUCKET/store/aggregation" store/aggregation
          aws s3 sync "s3://$R2_BUCKET/store/pmtiles" store/pmtiles
          aws s3 sync "s3://$R2_BUCKET/store/contour" store/contour
      - name: Downsample + bundle
        run: docker run --rm -v "$PWD/store:/app/pipelines/store" "$IMAGE:${{ github.sha }}" just combine
      - name: Push pyramid + bundles to R2
        run: |
          # Overview tiles + downsampling done-markers feed the next incremental run.
          aws s3 sync store/pmtiles "s3://$R2_BUCKET/store/pmtiles"
          aws s3 sync store/aggregation "s3://$R2_BUCKET/store/aggregation"
          # Final artifacts keyed by commit; release promotes them in place.
          aws s3 cp store/bundle "s3://$R2_BUCKET/build/${{ github.sha }}/" \
            --recursive --exclude '*' --include '*.pmtiles' --content-type application/octet-stream
          aws s3 cp store/bundle/manifest.json "s3://$R2_BUCKET/build/${{ github.sha }}/manifest.json" \
            --content-type application/json

  # ─── Contours (sharded — one global tippecanoe blows the 6 h cap at planet scale) ─
  # Size the fan-out to the FGB count (no download — just an R2 listing).
  contour-plan:
    needs: aggregate
    if: ${{ !cancelled() && needs.aggregate.result == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.m.outputs.shards }}
    steps:
      - id: m
        run: |
          count=$(aws s3 ls "s3://$R2_BUCKET/store/contour/" --recursive | grep -c '\.fgb$' || true)
          shards=$(python3 -c "import json,sys; c=int(sys.argv[1]); n=min(${AGG_SHARDS}, max(c,1)); print(json.dumps([{'i':i,'n':n} for i in range(n)]))" "$count")
          echo "shards=$shards" >> "$GITHUB_OUTPUT"
          echo "contour FGBs: $count → matrix $shards"

  # tippecanoe one strided FGB slice per runner → a per-shard contours pmtiles.
  contours:
    needs: [aggregate, contour-plan]
    if: ${{ !cancelled() && needs.contour-plan.result == 'success' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: read }
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.contour-plan.outputs.shards) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ghcr-login
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with: { tool-cache: true, android: true, dotnet: true, haskell: true, large-packages: true, swap-storage: true }
      # Pull ONLY this shard's FGB slice (not the whole set). List the FGB keys
      # (sorted = the order Python globs), derive the global maxz (so every shard
      # tiles to the same depth and tile-joins cleanly), and parallel-copy the
      # strided slice this shard owns.
      - name: Pull this shard's FGB slice from R2
        run: |
          mkdir -p store/contour store/bundle
          aws s3 ls "s3://$R2_BUCKET/store/contour/" --recursive | awk '{print $NF}' | grep '\.fgb$' | sort > /tmp/all.txt
          sed 's#.*/##; s/\.fgb$//' /tmp/all.txt | awk -F- '{print $4}' | sort -n | tail -1 > store/contour-maxz.txt
          awk -v i="${{ matrix.shard.i }}" -v n="${{ matrix.shard.n }}" 'NR % n == (i + 1) % n' /tmp/all.txt \
            | xargs -P 8 -I{} aws s3 cp "s3://$R2_BUCKET/{}" store/contour/
          echo "shard ${{ matrix.shard.i }}/${{ matrix.shard.n }}: $(ls store/contour/*.fgb 2>/dev/null | wc -l) FGBs, global maxz $(cat store/contour-maxz.txt)"
      - name: Contour shard ${{ matrix.shard.i }}
        run: |
          docker run --rm -v "$PWD/store:/app/pipelines/store" \
            "$IMAGE:${{ github.sha }}" just contour-shard ${{ matrix.shard.i }}
      - name: Push shard pmtiles to R2
        run: |
          aws s3 cp store/bundle "s3://$R2_BUCKET/build/${{ github.sha }}/contour-shards/" \
            --recursive --exclude '*' --include 'contours-shard-*.pmtiles' --content-type application/octet-stream

  # tile-join the per-shard pmtiles into one contours.pmtiles.
  contour-bundle:
    needs: contours
    if: ${{ !cancelled() && needs.contours.result == 'success' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: read }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ghcr-login
      - name: Pull shard pmtiles from R2
        run: |
          mkdir -p store/bundle
          aws s3 sync "s3://$R2_BUCKET/build/${{ github.sha }}/contour-shards" store/bundle
      - name: Merge contours
        run: docker run --rm -v "$PWD/store:/app/pipelines/store" "$IMAGE:${{ github.sha }}" just contour-merge
      - name: Push contours.pmtiles to R2 build
        run: |
          aws s3 cp store/bundle/contours.pmtiles "s3://$R2_BUCKET/build/${{ github.sha }}/contours.pmtiles" \
            --content-type application/octet-stream

  # The viewer references tiles by URL at runtime, so it builds independently.
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - name: Build viewer
        env:
          # Released viewer points at the Worker (tiles.openwaters.io); otherwise
          # the local default (localhost:8787).
          VITE_TILES_BASE: ${{ github.event_name == 'release' && 'https://tiles.openwaters.io' || '' }}
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v4
        with: { path: dist }

  # ─── Publish (releases only) ───────────────────────────────────────────────
  # Promote this commit's bundles to the served year prefix (server-side copy).
  publish-r2:
    if: github.event_name == 'release'
    needs: [bundle, contour-bundle]
    runs-on: ubuntu-latest
    steps:
      - name: Promote bundles → bathymetry/${{ env.GEBCO_YEAR }}/
        run: |
          aws s3 cp "s3://$R2_BUCKET/build/${{ github.sha }}/" \
            "s3://$R2_BUCKET/bathymetry/${GEBCO_YEAR}/" --recursive --exclude 'contour-shards/*'

  # Deploy the serving Worker (reads bathymetry/<year>/ from the same bucket).
  deploy-worker:
    if: github.event_name == 'release'
    needs: publish-r2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          npm ci
          npx wrangler deploy --var "TILES_PREFIX:bathymetry/${GEBCO_YEAR}/"

  # Deploy the viewer to GitHub Pages.
  deploy-pages:
    if: github.event_name == 'release'
    needs: web
    runs-on: ubuntu-latest
    permissions: { pages: write, id-token: write }
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency: { group: pages, cancel-in-progress: false }
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
