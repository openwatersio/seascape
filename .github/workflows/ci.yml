name: CI

# Light per-commit checks: build the toolchain image, run the offline self-checks
# against it, and compile-check the viewer. The heavy planet build is build.yml
# (workflow_dispatch only); releasing/deploying is release.yml.

on:
  push:

env:
  IMAGE: ghcr.io/${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build + push the toolchain image. buildx GHA cache → only recompiles when the
  # Dockerfile changes (shared with build.yml).
  image:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: ./.github/actions/ghcr-login
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Offline self-checks (synthetic data, no network/R2) — fast validation that the
  # image toolchain produces correct results.
  check:
    needs: image
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: read }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ghcr-login
      - name: Engine + source self-checks
        run: |
          docker run --rm "$IMAGE:${{ github.sha }}" just test-sources
          docker run --rm "$IMAGE:${{ github.sha }}" just test-engine

  # Compile-check the viewer (it's built + deployed on release; see release.yml)
  # and run the Worker's dependency-free self-checks (plain node assert scripts).
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - name: Build viewer
        run: |
          npm ci
          npm run build
      - name: Worker self-checks
        run: |
          # The .mjs checks import .ts directly — needs Node >= 22.18 (default type
          # stripping); "node-version: 22" above resolves the latest 22.x, which is past it.
          node worker/src/terrarium.test.mjs
          node worker/src/overlay.test.mjs
