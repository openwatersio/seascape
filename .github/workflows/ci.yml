name: CI

# Light per-commit checks: build the toolchain image, run the offline self-checks
# against it, and compile-check the viewer. The heavy planet build is build.yml
# (workflow_dispatch only); releasing/deploying is release.yml.

on:
  push:

env:
  IMAGE: ghcr.io/${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build + push the deps-only toolchain image (code is mounted at runtime), keyed on
  # the files that define the deps (IMAGE_TAG, exported by ghcr-login). When that tag
  # already exists in GHCR the build is skipped entirely — code-only pushes reuse it.
  image:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ghcr-login
      - name: Already in GHCR?
        id: have
        run: |
          if docker manifest inspect "$IMAGE:$IMAGE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"; echo "image current: $IMAGE:$IMAGE_TAG"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-buildx-action@v3
        if: steps.have.outputs.exists != 'true'
      - uses: docker/build-push-action@v6
        if: steps.have.outputs.exists != 'true'
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Offline self-checks (synthetic data, no network/R2) — fast validation that the
  # image toolchain produces correct results.
  check:
    needs: image
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: read }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ghcr-login
      - name: Test suite (self-checks + workflow lint)
        run: docker run --rm -v "$PWD:/app" "$IMAGE:$IMAGE_TAG" just test
      # The GC set-logic simulation exercises scripts/gc-collect.sh — the exact Collect step
      # gc.yml runs, the repo's only automated deletion — happy path + every refusal guard. Bare
      # bash + jq (both preinstalled on the runner); the toolchain image carries no jq, so no
      # docker run here.
      - name: GC collect simulation
        run: bash pipelines/test_gc.sh

  # Compile-check the viewer (it's built + deployed on release; see release.yml)
  # and run the Worker's dependency-free self-checks (plain node assert scripts).
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - name: Build viewer
        run: |
          npm ci
          npm run build
      - name: Style package tests (validate against the MapLibre style spec)
        run: npm test
      - name: Worker self-checks
        run: |
          # The .mjs checks import .ts directly — needs Node >= 22.18 (default type
          # stripping); "node-version: 22" above resolves the latest 22.x, which is past it.
          node worker/src/terrarium.test.mjs
          node worker/src/overlay.test.mjs
          node worker/src/cache.test.mjs
          node worker/src/coverage.test.mjs
          node worker/src/vector.test.mjs
      - name: Worker type-check (imports @openwaters/seascape across packages)
        working-directory: worker
        run: npx tsc --noEmit
