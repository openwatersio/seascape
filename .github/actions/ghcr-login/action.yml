name: GHCR login (with retry)
description: >-
  Log in to ghcr.io (retrying the occasionally-flaky token endpoint) and export
  IMAGE_TAG — the toolchain image's deps-hash tag. The image contains only the
  toolchain + Python deps (code is mounted at runtime), so it's keyed on the
  files that define those deps, not the commit sha.
runs:
  using: composite
  steps:
    - shell: bash
      run: echo "IMAGE_TAG=deps-${{ hashFiles('Dockerfile', 'pyproject.toml', 'uv.lock', 'patches/*.patch') }}" >> "$GITHUB_ENV"
    - shell: bash
      env:
        GHCR_TOKEN: ${{ github.token }}
        GHCR_USER: ${{ github.actor }}
      run: |
        for i in 1 2 3 4 5; do
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin && exit 0
          echo "ghcr login attempt $i failed; retrying in $((i * 5))s" >&2
          sleep $((i * 5))
        done
        exit 1
