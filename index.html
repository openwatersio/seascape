<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open Waters Bathymetry</title>
  <style>
    body {
      margin: 0;
    }

    #map {
      position: absolute;
      inset: 0;
    }

    #controls {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #fff;
      border-radius: 6px;
      padding: 8px 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      font: 13px/1.6 system-ui, sans-serif;
      z-index: 1;
    }

    #controls label {
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <div id="controls">
    <label>
      <input type="checkbox" id="toggle-depth" checked /> Depth shading
    </label><br />
    <label>
      <input type="checkbox" id="toggle-hillshade" /> Hillshade
    </label><br />
    <label>
      <input type="checkbox" id="toggle-contours" checked /> Contours
    </label><br />
    <label>
      <input type="checkbox" id="toggle-labels" checked /> Labels
    </label>
  </div>

  <script type="module" async src="./index.js"></script>
</body>

</html>
